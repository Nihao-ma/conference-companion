// 將 CONFERENCE_CONFIG 的 sessions[day] 結構轉為新 UI 的 blocks[] 結構
function buildDayBlocks(dayKey) {
  const blocks = [];
  for (const bl of SESSIONS[dayKey] || []) {
    if (bl.brk) {
      const rawTime = bl.time || "";
      const startTime = rawTime.split("–")[0].split("—")[0].trim();
      const label = bl.brk.replace(/^[📋☕👋⏰🍱🔔📅]\s*/, "");
      blocks.push({ time: startTime, kind: "mark", label, note: "" });
    } else if (bl.items) {
      const parts = (bl.time || "").split(/[–—]/);
      const startTime = parts[0].trim();
      const endTime   = parts[1] ? parts[1].trim() : "";
      for (const it of bl.items) {
        // 從 detail 裡提取 pin（⭐ 開頭的行）
        const pinMatch = (it.detail || "").match(/[⭐★]\s*(.+)$/m);
        const pin = pinMatch ? pinMatch[1].trim() : "";
        const cleanDetail = (it.detail || "").replace(/^[⭐★].*$/mg, "").trim();
        blocks.push({
          time: startTime, end: endTime,
          id: it.id, b: it.b || "edu",
          title: it.title,
          speakers: it.speakers || [],
          tags: it.tags || [],
          detail: cleanDetail,
          pin,
        });
      }
    }
  }
  return blocks;
}

const ALL_BLOCKS = {}; // dayKey → blocks[]

function CountRing({ days, size = 64 }) {
  const r = (size - 8) / 2, c = 2 * Math.PI * r;
  const frac = Math.max(0, Math.min(1, (7 - days) / 7));
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.22)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#fff" strokeWidth="4"
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - frac)}
          style={{ transition: "stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)" }}/>
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#fff" }}>

// ─── DRIVE API ─────────────────────────────────────────────────────────────────
async function driveGet(token, path, params = "") {
  const r = await fetch(`https://www.googleapis.com/drive/v3/${path}${params}`, { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) throw new Error(`Drive ${path} ${r.status}`);
  return r.json();
}
async function findFile(token, name, parentId) {
  const safe = name.replace(/'/g, "\\'");
  let q = `name='${safe}' and trashed=false`;
  if (parentId) q += ` and '${parentId}' in parents`;
  const d = await driveGet(token, "files", `?q=${encodeURIComponent(q)}&fields=files(id,name,webViewLink)`);
  return d.files?.[0] || null;
}
async function createFolder(token, name, parentId) {
  const meta = { name, mimeType: "application/vnd.google-apps.folder" };
  if (parentId) meta.parents = [parentId];
  const r = await fetch("https://www.googleapis.com/drive/v3/files", { method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(meta) });
  if (!r.ok) throw new Error("createFolder failed");
  return r.json();
}
async function getOrCreateFolder(token, name, parentId) {
  return (await findFile(token, name, parentId)) || (await createFolder(token, name, parentId));
}
async function readJsonFile(token, fileId) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) return null;
  return r.json();
}
async function writeJsonFile(token, name, data, parentId, existingId) {
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  const metaObj = { name, mimeType: "application/json" };
  if (parentId && !existingId) metaObj.parents = [parentId];
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metaObj)], { type: "application/json" }));
  form.append("file", blob);
  const url = existingId ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart` : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
  const r = await fetch(url, { method: existingId ? "PATCH" : "POST", headers: { Authorization: `Bearer ${token}` }, body: form });
  if (!r.ok) throw new Error("writeJsonFile failed");
  return r.json();
}
async function uploadMediaFile(token, file, sessionTitle) {
  const rootFolder = await getOrCreateFolder(token, C_CFG.driveFolderName, null);
  const folderName = sessionTitle.replace(/[★\*\/\\:]/g, "").trim().substring(0, 40);
  const sessionFolder = await getOrCreateFolder(token, folderName, rootFolder.id);
  const ts = new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" }).replace(":", "");
  const meta = JSON.stringify({ name: `${ts}_${file.name}`, parents: [sessionFolder.id] });
  const form = new FormData();
  form.append("metadata", new Blob([meta], { type: "application/json" }));
  form.append("file", file);
  const r = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,name", { method: "POST", headers: { Authorization: `Bearer ${token}` }, body: form });
  if (!r.ok) throw new Error("Upload failed");
  const d = await r.json();
  await fetch(`https://www.googleapis.com/drive/v3/files/${d.id}/permissions`, { method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify({ role: "reader", type: "anyone" }) });
  return d;
}

// ─── GOOGLE DOCS EXPORT ────────────────────────────────────────────────────────
async function exportToGoogleDoc(token, notes, media) {
  const docTitle = `${C_CFG.name} 會議筆記`;
  const r = await fetch("https://docs.googleapis.com/v1/documents", { method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify({ title: docTitle }) });
  if (!r.ok) throw new Error("無法建立 Google Doc");
  const doc = await r.json();
  const docId = doc.documentId;
  const lines = [];
  lines.push(`${C_CFG.name} 會議筆記`);
  lines.push(C_CFG.subtitle || "");
  lines.push(`匯出日期：${new Date().toLocaleDateString("zh-TW", { year: "numeric", month: "long", day: "numeric" })}`);
  lines.push("");
  for (const [day, blocks] of Object.entries(SESSIONS)) {
    for (const bl of blocks) {
      if (!bl.items) continue;
      for (const it of bl.items) {
        const note = notes[it.id];
        const med  = media[it.id] || {};
        if (!note && !med.driveLinks?.length && !med.videoLinks?.length) continue;
        lines.push(`▌ ${bl.time}  ${it.title}`);
        if (it.speakers?.length) lines.push(`   講者：${it.speakers.join(" / ")}`);
        if (note) { lines.push(""); lines.push("📝 筆記："); lines.push(note); }
        if (med.driveLinks?.length) { lines.push(""); lines.push("📷 照片："); for (const lk of med.driveLinks) lines.push(`   ${lk.label}：${lk.url}`); }
        if (med.videoLinks?.length) { lines.push(""); lines.push("🎥 影片："); for (const vl of med.videoLinks) lines.push(`   ${vl.label}：${vl.url}`); }
        lines.push("");
      }
    }
  }
  const text = lines.join("\n");
  await fetch(`https://docs.googleapis.com/v1/documents/${docId}:batchUpdate`, { method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" }, body: JSON.stringify({ requests: [{ insertText: { location: { index: 1 }, text } }] }) });
  return `https://docs.google.com/document/d/${docId}/edit`;
}

// ─── EXPORT HTML ───────────────────────────────────────────────────────────────
function generateExportHTML(notes, media) {
  const now = new Date().toLocaleDateString("zh-TW", { year: "numeric", month: "long", day: "numeric" });
  const sections = [];
  for (const [day, blocks] of Object.entries(SESSIONS)) {
    const dayItems = [];
    for (const bl of blocks) {
      if (!bl.items) continue;
      for (const it of bl.items) {
        const note = notes[it.id]; const med = media[it.id] || {};
        if (!note && !med.driveLinks?.length && !med.videoLinks?.length) continue;
        const bc = CONF.badges[it.b] || CONF.badges.edu;
        let h = `<div class="si"><div class="sh"><span class="badge" style="background:${bc.bg};color:${bc.fg}">${bc.label}</span><div><div class="stl">${bl.time}</div><div class="stt">${it.title}</div>${it.speakers?.length ? `<div class="spk">${it.speakers.join(" · ")}</div>` : ""}</div></div>`;
        if (note) h += `<div class="nb"><div class="nl">📝 筆記</div><div class="nt">${note.replace(/\n/g,"<br>")}</div></div>`;
        if (med.driveLinks?.length) { h += `<div class="mb"><div class="nl">📷 照片</div>`; for (const lk of med.driveLinks) h += `<a class="dl" href="${lk.url}" target="_blank">📷 ${lk.label}</a>`; h += `</div>`; }
        if (med.videoLinks?.length) { h += `<div class="mb"><div class="nl">🎥 影片</div>`; for (const vl of med.videoLinks) h += `<a class="dl" href="${vl.url}" target="_blank">▶ ${vl.label}</a>`; h += `</div>`; }
        h += `</div>`; dayItems.push(h);
      }
    }
    if (dayItems.length) sections.push(`<div class="ds"><div class="dh">${DAYS[day]}</div>${dayItems.join("")}</div>`);
  }
  const noteCount = Object.keys(notes).length;
  const mediaCount = Object.values(media).reduce((a, m) => a + (m.driveLinks?.length||0) + (m.videoLinks?.length||0), 0);
  return `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${C_CFG.name} 會議筆記</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#FAFAF8;color:#1C1917}.cov{background:linear-gradient(135deg,#312E81,#4338CA);color:#fff;padding:52px 36px 44px}.ct{font-size:34px;font-weight:700;margin-bottom:6px}.cs{font-size:14px;opacity:.7;margin-bottom:20px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:720px;margin:32px auto 0;padding:0 20px}.stat{background:#fff;border:1px solid #E7E5E4;border-radius:10px;padding:14px;text-align:center}.sn{font-size:26px;font-weight:700;color:#312E81}.sl{font-size:11px;color:#78716C;margin-top:2px}.con{max-width:720px;margin:0 auto;padding:32px 20px 80px}.ds{margin-bottom:36px}.dh{font-size:18px;font-weight:700;color:#312E81;padding:10px 0;border-bottom:2px solid #312E81;margin-bottom:16px}.si{background:#fff;border:1px solid #E7E5E4;border-radius:12px;padding:18px;margin-bottom:12px}.sh{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px}.stl{font-size:10px;color:#A8A29E}.stt{font-size:14px;font-weight:600;color:#1C1917;line-height:1.4}.spk{font-size:11px;color:#78716C;margin-top:3px}.nb{background:#FAFAF8;border-left:3px solid #312E81;border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:8px}.nl{font-size:10px;font-weight:700;letter-spacing:.5px;color:#A8A29E;margin-bottom:5px}.nt{font-size:13px;color:#292524;line-height:1.7;white-space:pre-wrap}.mb{margin-bottom:8px}.dl{display:inline-flex;background:#EEF0FD;color:#3730A3;border-radius:6px;padding:5px 10px;font-size:12px;text-decoration:none;margin:2px}</style></head><body><div class="cov"><div class="ct">${C_CFG.name}</div><div class="cs">${C_CFG.subtitle||""}</div><div style="font-size:12px;opacity:.5">📅 ${C_CFG.dates}　🗓 匯出於 ${now}</div></div><div class="stats"><div class="stat"><div class="sn">${noteCount}</div><div class="sl">則文字筆記</div></div><div class="stat"><div class="sn">${mediaCount}</div><div class="sl">個媒體連結</div></div><div class="stat"><div class="sn">${sections.length}</div><div class="sl">天有記錄</div></div></div><div class="con">${sections.length?sections.join(""):`<div style="text-align:center;padding:60px;color:#bbb">📭 尚無筆記</div>`}</div></body></html>`;
}

// ─── HOME SCREEN ───────────────────────────────────────────────────────────────
function HomeScreen({ S }) {
  const { daysLeft, notes, reminders, toggleReminder, goSession } = S;
  const firstDayBlocks = CONF.allBlocks[CONF.dayKeys[0]] || [];
  const recs = firstDayBlocks.filter(b => b.id && b.tags.includes("star")).slice(0, 3);

  function Row({ icon, text, sub }) {
    return (
      <div style={{ display: "flex", gap: 9, alignItems: "flex-start" }}>
        <span style={{ marginTop: 1 }}><Icon name={icon} size={15} color="rgba(255,255,255,.8)"/></span>
        <div>
          <div style={{ fontSize: 12.5, color: "#fff", fontWeight: 500, lineHeight: 1.4 }}>{text}</div>
          {sub && <div style={{ fontSize: 11, color: "rgba(255,255,255,.6)", marginTop: 1 }}>{sub}</div>}
        </div>
      </div>

  const sessionCount = firstDayBlocks.filter(b => b.id).length;

  return (
    <div style={{ padding: "4px 16px 20px" }}>
      {/* HERO */}
      <div style={{ position: "relative", overflow: "hidden", borderRadius: 24, padding: "20px 20px 22px", background: `linear-gradient(150deg, ${T.heroFrom}, ${T.heroTo})`, boxShadow: "0 18px 40px -22px rgba(49,46,129,.85)" }}>
        <div style={{ position: "absolute", top: -60, right: -50, width: 200, height: 200, borderRadius: "50%", background: "rgba(255,255,255,.07)" }} />
        <div style={{ position: "absolute", bottom: -70, left: -30, width: 150, height: 150, borderRadius: "50%", background: "rgba(255,255,255,.05)" }} />
        <div style={{ position: "relative" }}>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,.72)", fontWeight: 500, letterSpacing: ".3px" }}>{CONF.org}</div>
          <div style={{ display: "flex", gap: 14, marginTop: 12, alignItems: "flex-start" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: FONT_SERIF, fontWeight: 700, fontSize: 21, color: "#fff", lineHeight: 1.32, letterSpacing: ".2px" }}>{CONF.name}</div>
              <div style={{ marginTop: 10, display: "inline-flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,.16)", borderRadius: 8, padding: "5px 10px" }}>
                <Icon name="calendar" size={14} color="#fff" stroke={2}/>
                <span style={{ fontSize: 12.5, color: "#fff", fontWeight: 600 }}>{CONF.dates}</span>
              </div>
            </div>
            <CountRing days={daysLeft} />
          </div>
          <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid rgba(255,255,255,.16)", display: "flex", flexDirection: "column", gap: 9 }}>
            <Row icon="pin" text={CONF.venue} sub={CONF.venueAddr} />
            {CONF.registration && <Row icon="clock" text={CONF.registration} />}
          </div>
        </div>
      </div>

      {/* quick actions */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
        <QuickBtn icon="calendar" label="查看議程" sub={`${sessionCount} 個場次`} onClick={() => S.goTo("sched")} primary />
        <QuickBtn icon="map" label="會場地圖" sub={CONF.venue.substring(0, 8)} onClick={() => window.open(CONF.mapsUrl, "_blank")} />
      </div>

      {/* recommended */}
      {recs.length > 0 && <>
        <SectionHead>為您推薦</SectionHead>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {recs.map(s => (
            <Card key={s.id} pad={14} onClick={() => goSession(s.id)} style={{ cursor: "pointer" }}>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                <div style={{ flexShrink: 0, width: 46, textAlign: "center" }}>
                  <div style={{ fontFamily: FONT_SERIF, fontSize: 17, fontWeight: 700, color: T.primary, lineHeight: 1 }}>{s.time}</div>
                  <div style={{ fontSize: 10, color: T.faint, marginTop: 3 }}>{s.end}</div>
                </div>
                <div style={{ width: 1, alignSelf: "stretch", background: T.hair }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: T.ink, lineHeight: 1.4, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{s.title}</div>
                  <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 5 }}>
                    <span style={{ fontSize: 11.5, color: T.muted }}>{s.speakers[0]}</span>
                    {notes[s.id] && <Icon name="note" size={13} color={T.gold}/>}
                  </div>
                </div>
                <Icon name="chevR" size={17} color={T.faint}/>
              </div>
            </Card>
          ))}
        </div>
      </>}

      {/* prep checklist */}
      {CONF.reminders.length > 0 && <>
        <SectionHead action={<span style={{ fontSize: 11.5, color: T.muted }}>{doneCount}/{CONF.reminders.length}</span>}>行前準備</SectionHead>
        <Card pad={6}>
          {CONF.reminders.map((r, i) => {
            const on = !!reminders[i];
            return (
              <div key={i} onClick={() => toggleReminder(i)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 12px", cursor: "pointer", borderBottom: i < CONF.reminders.length - 1 ? `1px solid ${T.hair2}` : "none" }}>
                <div style={{ width: 22, height: 22, borderRadius: 7, flexShrink: 0, border: on ? "none" : `1.8px solid ${T.faint}`, background: on ? T.primary : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}>{on && <Icon name="check" size={14} color={T.onPrimary} stroke={2.4}/>}</div>
                <div style={{ fontSize: 13.5, color: on ? T.muted : T.ink2, textDecoration: on ? "line-through" : "none", lineHeight: 1.4 }}>{r}</div>
              </div>

          })}

      </>}

      {/* info */}
      {CONF.links.length > 0 && <>
        <SectionHead>重要資訊</SectionHead>
        <Card pad={6}>
          {CONF.credits && <InfoRow icon="spark" label="積分" value={CONF.credits} />}
          {CONF.links.map(([label, url], i) => (
            <InfoRow key={i} icon="link" label={label} link onClick={() => window.open(url, "_blank")} last={i === CONF.links.length - 1} />
          ))}
        </Card>
      </>}
    </div>
  );
}

function QuickBtn({ icon, label, sub, onClick, primary }) {
  return (
    <div onClick={onClick} style={{ cursor: "pointer", borderRadius: 16, padding: "14px 15px", background: primary ? T.primary : T.surface, border: `1px solid ${primary ? "transparent" : T.hair}`, boxShadow: primary ? "0 8px 20px -12px "+T.primary : "0 1px 2px rgba(27,25,48,.04)" }}>
      <Icon name={icon} size={20} color={primary ? T.onPrimary : T.primary}/>
      <div style={{ marginTop: 10, fontSize: 14.5, fontWeight: 700, color: primary ? T.onPrimary : T.ink }}>{label}</div>
      <div style={{ fontSize: 11, color: primary ? "rgba(255,255,255,.7)" : T.muted, marginTop: 1 }}>{sub}</div>
    </div>
  );
}

function InfoRow({ icon, label, value, link, onClick, last }) {
  return (
    <div onClick={onClick} style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 11px", cursor: onClick ? "pointer" : "default", borderBottom: last ? "none" : `1px solid ${T.hair2}` }}>
      <Icon name={icon} size={17} color={T.primary}/>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13.5, fontWeight: link ? 600 : 500, color: link ? T.primary : T.ink2, lineHeight: 1.4 }}>{label}</div>
        {value && <div style={{ fontSize: 12, color: T.muted, marginTop: 2, lineHeight: 1.4 }}>{value}</div>}
      </div>
      {link && <Icon name="arrowR" size={15} color={T.faint}/>}
    </div>

}

// ─── SCHEDULE SCREEN ───────────────────────────────────────────────────────────
function FilterBar({ filter, setFilter, counts }) {
  const chips = [
    ["all", "全部", counts.all],
    ["star", "★ 推薦", counts.star],
    ["prenatal", "產前", counts.prenatal],
    ["cyto", "細胞遺傳", counts.cyto],
    ["notes", "我的筆記", counts.notes],
  ].filter(([k, , n]) => k === "all" || k === "notes" || n > 0);
  return (
    <div style={{ display: "flex", gap: 7, overflowX: "auto", padding: "2px 16px 2px", WebkitOverflowScrolling: "touch" }}>
      {chips.map(([k, label, n]) => {
        const on = filter === k;
        return (
          <button key={k} onClick={() => setFilter(k)} style={{ flexShrink: 0, border: "none", cursor: "pointer", fontFamily: FONT_SANS, fontSize: 12.5, fontWeight: 600, padding: "7px 13px", borderRadius: 999, background: on ? T.primary : T.surface, color: on ? T.onPrimary : T.ink2, boxShadow: on ? "none" : `inset 0 0 0 1px ${T.hair}`, transition: "all .15s" }}>
            {label}{typeof n === "number" && n > 0 && <span style={{ opacity: on ? .8 : .5, marginLeft: 5 }}>{n}</span>}
          </button>
        );
      })}
    </div>
  );
}

function ScheduleScreen({ S }) {
  const { notes, media, filter, setFilter, expanded, toggleExpand, curDay, setCurDay } = S;
  const blocks = CONF.allBlocks[curDay] || [];
  const sessions = blocks.filter(b => b.id);
  const counts = {
    all: sessions.length,
    star: sessions.filter(s => s.tags.includes("star")).length,
    prenatal: sessions.filter(s => s.tags.includes("prenatal")).length,
    cyto: sessions.filter(s => s.tags.includes("cyto")).length,
    notes: sessions.filter(s => notes[s.id] || hasMedCount(media[s.id])).length,
  };
  const matches = (s) => {
    if (filter === "all") return true;
    if (filter === "notes") return notes[s.id] || hasMedCount(media[s.id]);
    return s.tags.includes(filter);
  };

  return (
    <div>
      <div style={{ position: "sticky", top: 0, zIndex: 4, background: T.paper, paddingTop: 4, paddingBottom: 8 }}>
        {/* Day selector — only show if multiple days */}
        {CONF.dayKeys.length > 1 && (
          <div style={{ display: "flex", gap: 6, padding: "0 16px 10px", overflowX: "auto" }}>
            {CONF.dayKeys.map(dk => {
              const on = dk === curDay;
              return (
                <button key={dk} onClick={() => setCurDay(dk)} style={{ flexShrink: 0, border: "none", cursor: "pointer", fontFamily: FONT_SANS, fontSize: 12.5, fontWeight: 600, padding: "6px 14px", borderRadius: 999, background: on ? T.primaryTint : "transparent", color: on ? T.primary : T.muted }}>
                  {CONF.days[dk] || dk}
                </button>
              );
            })}
          </div>
        )}
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "0 16px 10px" }}>
          <div style={{ fontFamily: FONT_SERIF, fontSize: 15, fontWeight: 700, color: T.ink }}>{CONF.days[curDay] || curDay}</div>
          <div style={{ fontSize: 11.5, color: T.muted }}>· {sessions.length} 場</div>
        </div>
        <FilterBar filter={filter} setFilter={setFilter} counts={counts} />
      </div>

      <div style={{ padding: "6px 16px 24px" }}>
        <div style={{ position: "relative" }}>
          <div style={{ position: "absolute", left: 47, top: 8, bottom: 8, width: 2, background: T.hair }} />
          {blocks.map((b, i) => {
            if (b.kind === "mark") return <Marker key={i} b={b} />;
            if (!matches(b)) return null;
            return <SessionCard key={b.id} b={b} S={S} />;
          })}
        </div>
        {sessions.filter(matches).length === 0 && (
          <div style={{ textAlign: "center", padding: "48px 20px", color: T.faint }}>
            <div style={{ display: "inline-flex", marginBottom: 10 }}><Icon name="note" size={30} color={T.faint}/></div>
            <div style={{ fontSize: 13 }}>此分類目前沒有場次</div>
          </div>
        )}
      </div>
    </div>
  );
}

function hasMedCount(med) {
  return (med?.driveLinks?.length || 0) + (med?.videoLinks?.length || 0);
}

function Marker({ b }) {
  return (
    <div style={{ display: "flex", alignItems: "center", padding: "7px 0", position: "relative" }}>
      <div style={{ width: 47, textAlign: "right", paddingRight: 13, fontSize: 11.5, color: T.faint, fontWeight: 600, fontFamily: FONT_SERIF }}>{b.time}</div>
      <div style={{ width: 11, height: 11, borderRadius: "50%", background: T.paper, border: `2px solid ${T.faint}`, flexShrink: 0, zIndex: 1, marginLeft: -5.5 }} />
      <div style={{ marginLeft: 13, display: "flex", alignItems: "baseline", gap: 8 }}>
        <span style={{ fontSize: 12.5, fontWeight: 600, color: T.ink2 }}>{b.label}</span>
        {b.note && <span style={{ fontSize: 11, color: T.faint }}>{b.note}</span>}
      </div>
    </div>
  );
}

function SessionCard({ b, S }) {
  const { notes, saveNote, media, addMediaLink, removeMediaLink, accessToken, uploading, handleCapture, expanded, toggleExpand, syncStatus } = S;
  const open = !!expanded[b.id];
  const hasNote = !!notes[b.id];
  const med = media[b.id] || { driveLinks: [], videoLinks: [] };
  const medCount = hasMedCount(med);
  const hasMed = medCount > 0;
  const [draft, setDraft] = useState(notes[b.id] || "");
  const [saved, setSaved] = useState(false);
  const isUploading = !!uploading[b.id];
  const cameraRef = useRef(null);
  const videoRef  = useRef(null);
  const libRef    = useRef(null);

  useEffect(() => { if (open) setDraft(notes[b.id] || ""); }, [open]);

  const accent = hasNote ? T.gold : hasMed ? T.primary : null;

  const save = () => {
    saveNote(b.id, draft.trim());
    setSaved(true); setTimeout(() => setSaved(false), 1600);
  };

  return (
    <div id={"sess-" + b.id} style={{ display: "flex", marginBottom: 10, position: "relative", scrollMarginTop: 80 }}>
      {/* hidden file inputs */}
      <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
        onChange={e => { handleCapture(b.id, b.title, e.target); e.target.value = ""; }} />
      <input ref={videoRef} type="file" accept="video/*" capture="environment" style={{ display: "none" }}
        onChange={e => { handleCapture(b.id, b.title, e.target); e.target.value = ""; }} />
      <input ref={libRef} type="file" accept="image/*,video/*" multiple style={{ display: "none" }}
        onChange={e => { handleCapture(b.id, b.title, e.target); e.target.value = ""; }} />

      <div style={{ width: 47, flexShrink: 0, textAlign: "right", paddingRight: 13, paddingTop: 13 }}>
        <div style={{ fontFamily: FONT_SERIF, fontSize: 14.5, fontWeight: 700, color: T.primary, lineHeight: 1 }}>{b.time}</div>
        <div style={{ fontSize: 10, color: T.faint, marginTop: 3 }}>{b.end}</div>
      </div>
      <div style={{ width: 13, height: 13, borderRadius: "50%", background: accent || T.surface, border: `2.5px solid ${accent || T.primary}`, flexShrink: 0, zIndex: 1, marginLeft: -6.5, marginTop: 15 }} />

      <div style={{ flex: 1, minWidth: 0, marginLeft: 13 }}>
        <div style={{ background: T.surface, borderRadius: 16, overflow: "hidden", border: `1px solid ${accent ? accent+"55" : T.hair}`, boxShadow: open ? "0 10px 28px -16px rgba(27,25,48,.3)" : "0 1px 2px rgba(27,25,48,.04), 0 6px 16px -12px rgba(27,25,48,.10)", transition: "box-shadow .2s" }}>

          {/* header row */}
          <div onClick={() => toggleExpand(b.id)} style={{ padding: "13px 14px", cursor: "pointer", display: "flex", gap: 10, alignItems: "flex-start" }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 7 }}>
                <TypeBadge b={b.b} />
                {hasNote && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10.5, fontWeight: 600, color: T.gold }}><Icon name="note" size={12} color={T.gold}/>筆記</span>}
                {hasMed && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10.5, fontWeight: 600, color: T.primary }}><Icon name="camera" size={12} color={T.primary}/>{medCount}</span>}
              </div>
              <div style={{ fontSize: 14, fontWeight: 600, color: T.ink, lineHeight: 1.42, letterSpacing: ".1px" }}>{b.title}</div>
              <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 11.5, color: T.muted, fontWeight: 500 }}>
                  <Icon name="user" size={12} color={T.muted}/>{b.speakers.join("、")}
                </span>
              </div>
              {b.tags.length > 0 && (
                <div style={{ marginTop: 8, display: "flex", gap: 5, flexWrap: "wrap" }}>
                  {b.tags.map(t => <TagChip key={t} t={t} small />)}
                </div>
              )}
            </div>
            <span style={{ color: T.faint, marginTop: 2, transform: open ? "rotate(90deg)" : "none", transition: "transform .2s", flexShrink: 0 }}>
              <Icon name="chevR" size={16} color={T.faint}/>
            </span>
          </div>

          {/* expanded content */}
          {open && (
            <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${T.hair2}` }} onClick={e => e.stopPropagation()}>
              {b.pin && (
                <div style={{ display: "flex", gap: 7, alignItems: "flex-start", background: T.goldTint, borderRadius: 10, padding: "9px 11px", marginTop: 12 }}>
                  <span style={{ marginTop: 1, flexShrink: 0 }}><Icon name="star" size={13} color={T.gold}/></span>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.gold, lineHeight: 1.45 }}>{b.pin}</div>
                </div>
              )}
              {b.detail && <div style={{ fontSize: 12.5, color: T.ink2, lineHeight: 1.7, marginTop: 12, whiteSpace: "pre-line" }}>{b.detail}</div>}

              {/* speakers */}
              <div style={{ marginTop: 13, paddingTop: 13, borderTop: `1px solid ${T.hair2}` }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".5px", color: T.muted, marginBottom: 8 }}>講者</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {b.speakers.map(sp => (
                    <span key={sp} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: T.surfaceAlt, border: `1px solid ${T.hair}`, borderRadius: 999, padding: "5px 11px 5px 6px", fontSize: 12, color: T.ink2, fontWeight: 500 }}>
                      <span style={{ width: 20, height: 20, borderRadius: "50%", background: T.primaryTint, color: T.primary, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700 }}>{sp[0]}</span>
                      {sp}
                    </span>
                  ))}
                </div>
              </div>

              {/* NOTE editor */}
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.hair2}` }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, fontWeight: 700, letterSpacing: ".4px", color: T.muted }}>
                    <Icon name="note" size={13} color={T.muted}/>我的筆記
                  </div>
                  {accessToken && <SyncPill saved={saved} syncing={syncStatus === "syncing"} />}
                </div>
                <textarea value={draft} onChange={e => setDraft(e.target.value)} placeholder="記錄重點、問題、要追問的細節…"
                  style={{ width: "100%", boxSizing: "border-box", border: `1px solid ${T.hair}`, borderRadius: 11, padding: "11px 12px", fontSize: 13, background: T.surfaceAlt, color: T.ink, resize: "vertical", minHeight: 76, fontFamily: FONT_SANS, lineHeight: 1.6, outline: "none" }} />
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 7, marginTop: 8 }}>
                  {hasNote && <button onClick={() => { setDraft(""); saveNote(b.id, ""); }} style={btnSt("ghost")}>清除</button>}
                  <button onClick={save} disabled={draft.trim() === (notes[b.id] || "")} style={btnSt(draft.trim() === (notes[b.id] || "") ? "disabled" : "solid")}>
                    {saved ? "已儲存 ✓" : "儲存筆記"}
                  </button>
                </div>

  const latestResult = [...CONF.checkpoints].reverse().find(cp => updates[cp.key]);

  return (
    <div style={{ padding: "4px 16px 24px" }}>
      <div style={{ background: T.surface, border: `1px solid ${T.hair}`, borderRadius: 16, padding: "15px 16px", boxShadow: "0 1px 2px rgba(27,25,48,.04)" }}>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 9 }}>
        {CONF.checkpoints.map(cp => {
          const done   = !!updates[cp.key];
          const active = !done && daysLeft <= cp.days + 1 && daysLeft > 0;
          return (
            <div key={cp.key} style={{ background: done ? "#E6F6F0" : T.surface, border: `1px solid ${done ? "#0A6E5055" : active ? T.primary+"66" : T.hair}`, borderRadius: 13, padding: "12px 9px", textAlign: "center" }}>
              <div style={{ width: 26, height: 26, borderRadius: "50%", margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "center", background: done ? "#0A6E50" : active ? T.primary : T.surfaceAlt }}>
                <Icon name={done ? "check" : "clock"} size={14} color={done || active ? "#fff" : T.faint} stroke={2.2}/>
              </div>
              <div style={{ fontSize: 11.5, fontWeight: 700, color: done ? "#0A6E50" : active ? T.primary : T.ink2, marginTop: 7 }}>{cp.label}</div>
              <div style={{ fontSize: 10, color: T.muted, marginTop: 2, lineHeight: 1.35 }}>
                {done ? "✓ 已完成" : daysLeft <= cp.days ? "建議執行" : `還有 ${daysLeft - cp.days} 天`}
              </div>
            </div>
          );
        })}
      </div>

      <SectionHead action={lastCheck && !lastCheck.error && <span style={{ fontSize: 11, color: T.muted }}>{lastCheck.time}</span>}>分析結果</SectionHead>

      {isUpdating ? (
        <Card pad={18}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div className="cc-spin" style={{ width: 22, height: 22, borderRadius: "50%", border: `2.5px solid ${T.hair}`, borderTopColor: T.primary, flexShrink: 0 }} />
            <div>
              <div style={{ fontSize: 13.5, fontWeight: 600, color: T.ink }}>正在抓取官網並進行 AI 分析…</div>
              <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>比對議程、講者與行前提醒</div>
            </div>
          </div>
        </Card>
      ) : lastCheck?.error ? (
        <Card pad={14} style={{ background: "#FFF1F1", borderColor: "#FECACA" }}>
          <div style={{ fontSize: 13, color: "#991B1B", lineHeight: 1.6 }}>⚠️ 上次更新遇到錯誤（{lastCheck.time}）。請稍後重試。</div>
        </Card>
      ) : latestResult ? (
        <Card pad={0}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 15px", borderBottom: `1px solid ${T.hair2}` }}>
            <Icon name="spark" size={15} color={T.primary}/>
            <span style={{ fontSize: 12, fontWeight: 700, color: T.ink2 }}>{updates[latestResult.key].label}・{updates[latestResult.key].time}</span>
            <button onClick={runUpdate} style={{ marginLeft: "auto", border: "none", background: T.primaryTint, color: T.primary, cursor: "pointer", borderRadius: 8, padding: "5px 11px", fontSize: 11.5, fontWeight: 600, fontFamily: FONT_SANS }}>重新整理</button>
          </div>
          <div style={{ padding: "13px 15px", fontSize: 13, color: T.ink2, lineHeight: 1.8, whiteSpace: "pre-line" }}>
            {fmtText(updates[latestResult.key].result)}
          </div>
        </Card>
      ) : (
        <Card pad={20} style={{ textAlign: "center" }}>
          <div style={{ display: "inline-flex", marginBottom: 10 }}><Icon name="refresh" size={28} color={T.faint}/></div>
          <div style={{ fontSize: 13, color: T.muted, lineHeight: 1.6 }}>尚未執行更新。<br/>到期會自動觸發，或立即手動執行。</div>
        </Card>
      )}

      <button onClick={runUpdate} disabled={isUpdating} style={{ width: "100%", marginTop: 14, border: "none", cursor: isUpdating ? "default" : "pointer", borderRadius: 13, padding: "14px 0", fontSize: 14, fontWeight: 700, fontFamily: FONT_SANS, background: isUpdating ? T.surfaceAlt : T.primary, color: isUpdating ? T.faint : T.onPrimary, boxShadow: isUpdating ? "none" : "0 10px 24px -14px "+T.primary, display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        {!isUpdating && <Icon name="refresh" size={17} color={T.onPrimary}/>}
        {isUpdating ? "分析中…" : latestResult ? "立即重新檢查" : "立即執行更新"}
      </button>
    </div>
  );
}

function fmtText(text) {
  return (text || "").split(/(【[^】]+】)/g).map((part, i) =>
    part.startsWith("【")
      ? <b key={i} style={{ color: T.primary, fontWeight: 700 }}>{part}</b>
      : <React.Fragment key={i}>{part}</React.Fragment>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]               = useState("home");
  const [curDay, setCurDay]         = useState(DAY_KEYS[0]);
  const [notes, setNotes]           = useState(loadLS(NK));
  const [media, setMedia]           = useState(loadLS(MK));
  const [updates, setUpdates]       = useState(loadLS(UK));
  const [expanded, setExpanded]     = useState({});
  const [filter, setFilter]         = useState("all");
  const [reminders, setRem]         = useState(() => { try { return JSON.parse(localStorage.getItem("ccx_rem")||"{}"); } catch { return {}; } });
  const [isUpdating, setIsUpdating] = useState(false);
  const [hasDot, setHasDot]         = useState(false);
  const [toast, setToast]           = useState(null);
  const [uploading, setUploading]   = useState({});
  const [exportingDoc, setExportingDoc] = useState(false);
  const [exportDone, setExportDone] = useState(false);

  // Google auth
  const [accessToken, setAccessToken] = useState(null);
  const [userEmail, setUserEmail]     = useState(null);
  const [tokenClient, setTokenClient] = useState(null);
  const [syncStatus, setSyncStatus]   = useState("idle");
  const accessTokenRef = useRef(null);
  const driveRootIdRef = useRef(null);
  const driveFileIdRef = useRef(null);

  const scrollRef    = useRef(null);
  const pendingScroll = useRef(null);

  const startDate = new Date(C_CFG.startDate);
  const daysLeft  = Math.max(0, Math.ceil((startDate - new Date()) / 86400000));

  // Persist reminders
  useEffect(() => { localStorage.setItem("ccx_rem", JSON.stringify(reminders)); }, [reminders]);

  // Scroll top on tab change
  useEffect(() => {
    if (pendingScroll.current) {
      const id = pendingScroll.current; pendingScroll.current = null;
      requestAnimationFrame(() => {
        const el = document.getElementById("sess-"+id);
        if (el && scrollRef.current) scrollRef.current.scrollTop = Math.max(0, el.offsetTop - 76);
      });
    } else if (scrollRef.current) {
      scrollRef.current.scrollTop = 0;
    }
  }, [tab]);

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  // ── Google Identity Services ────────────────────────────────────────────────
  useEffect(() => {
    const init = () => {
      if (!window.google?.accounts?.oauth2) return;
      const tc = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: async (resp) => {
          if (resp.error) { console.error("OAuth:", resp.error); return; }
          accessTokenRef.current = resp.access_token;
          setAccessToken(resp.access_token);
          try {
            const r = await fetch("https://www.googleapis.com/oauth2/v1/userinfo", { headers: { Authorization: `Bearer ${resp.access_token}` } });
            const u = await r.json();
            setUserEmail(u.email);
          } catch {}
          await loadNotesFromDrive(resp.access_token);
        }
      });
      setTokenClient(tc);
    };
    if (window.google?.accounts?.oauth2) init();
    else {
      const t = setInterval(() => { if (window.google?.accounts?.oauth2) { init(); clearInterval(t); } }, 300);
      return () => clearInterval(t);
    }
  }, []);

  // ── Drive: load ─────────────────────────────────────────────────────────────
  const loadNotesFromDrive = async (token) => {
    setSyncStatus("syncing");
    try {
      const rootFolder = await getOrCreateFolder(token, C_CFG.driveFolderName, null);
      driveRootIdRef.current = rootFolder.id;
      const file = await findFile(token, C_CFG.notesFileName, rootFolder.id);
      if (file) {
        driveFileIdRef.current = file.id;
        const data = await readJsonFile(token, file.id);
        if (data?.notes) { saveLS(NK, data.notes); setNotes(data.notes); }
        if (data?.media) { saveLS(MK, data.media); setMedia(data.media); }
      }
      setSyncStatus("done");
    } catch (e) { console.error("Drive load:", e); setSyncStatus("error"); }
  };

  // ── Drive: save ─────────────────────────────────────────────────────────────
  const saveToDrive = useCallback(async (newNotes, newMedia) => {
    if (!accessTokenRef.current || !driveRootIdRef.current) return;
    setSyncStatus("syncing");
    try {
      const data = { notes: newNotes, media: newMedia, conference: C_CFG.name, savedAt: new Date().toISOString() };
      const result = await writeJsonFile(accessTokenRef.current, C_CFG.notesFileName, data, driveRootIdRef.current, driveFileIdRef.current);
      if (!driveFileIdRef.current && result?.id) driveFileIdRef.current = result.id;
      setSyncStatus("done");
    } catch (e) { console.error("Drive save:", e); setSyncStatus("error"); }
  }, []);

  // ── Note save ───────────────────────────────────────────────────────────────
  const saveNote = useCallback((id, txt) => {
    const n = { ...loadLS(NK) };
    if (txt.trim()) n[id] = txt; else delete n[id];
    saveLS(NK, n); setNotes(n);
    saveToDrive(n, loadLS(MK));
  }, [saveToDrive]);

  // ── Media: add/remove Drive links ───────────────────────────────────────────
  const addMediaLink = useCallback((id, type, link) => {
    const m = { ...loadLS(MK) };
    const cur = m[id] || { driveLinks: [], videoLinks: [] };
    if (type === "drive") cur.driveLinks = [...(cur.driveLinks||[]), link];
    else cur.videoLinks = [...(cur.videoLinks||[]), link];
    m[id] = cur;
    saveLS(MK, m); setMedia(m);
    saveToDrive(loadLS(NK), m);
  }, [saveToDrive]);

  const removeMediaLink = useCallback((id, type, idx) => {
    const m = { ...loadLS(MK) };
    const cur = m[id] || { driveLinks: [], videoLinks: [] };
    if (type === "drive") cur.driveLinks = (cur.driveLinks||[]).filter((_, i) => i !== idx);
    else cur.videoLinks = (cur.videoLinks||[]).filter((_, i) => i !== idx);
    const hasContent = (cur.driveLinks?.length||0) + (cur.videoLinks?.length||0) > 0;
    if (hasContent) m[id] = cur; else delete m[id];
    saveLS(MK, m); setMedia(m);
    saveToDrive(loadLS(NK), m);
  }, [saveToDrive]);

  // ── Camera / upload ─────────────────────────────────────────────────────────
  const handleCapture = useCallback(async (id, sessionTitle, fileInput) => {
    if (!accessTokenRef.current) { showToast("請先登入 Google 帳號"); return; }
    const files = Array.from(fileInput.files || []);
    if (!files.length) return;
    setUploading(p => ({ ...p, [id]: true }));
    try {
      for (const file of files) {
        const isVideo = file.type.startsWith("video/");
        const result  = await uploadMediaFile(accessTokenRef.current, file, sessionTitle);
        const timeStr = new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });
        const label   = `${sessionTitle.substring(0, 15)} ${isVideo ? "錄影" : "照片"} ${timeStr}`;
        addMediaLink(id, isVideo ? "video" : "drive", { url: result.webViewLink, label });
      }
      showToast("已上傳至 Drive");
    } catch (e) { showToast("上傳失敗：" + e.message); console.error(e); }
    setUploading(p => { const n = { ...p }; delete n[id]; return n; });
  }, [addMediaLink]);

  // ── AI Update ───────────────────────────────────────────────────────────────
  const fetchAndAnalyze = useCallback(async (label) => {
    if (isUpdating) return;
    setIsUpdating(true); setTab("updates");
    let fetched = "";
    for (const url of C_CFG.updateUrls || []) {
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        if (r.ok) {
          const d = await r.json();
          const tmp = document.createElement("div"); tmp.innerHTML = d.contents || "";
          fetched += `\n=== ${url} ===\n` + (tmp.innerText||"").replace(/\s+/g," ").substring(0,2500);
        }
      } catch { fetched += `\n=== ${url} ===\n[無法抓取]`; }
    }
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: `你是${C_CFG.specialistProfile}的大會助理。以下是${C_CFG.name}官網最新內容（${label}）：\n${fetched}\n\n請用繁體中文：\n【1.議程異動】比對重點場次（${C_CFG.keySessionsDesc}）是否有異動。若無說「目前無重大議程異動」。\n【2.新增講者】若無說「無新增講者」。\n【3.每日建議】針對${C_CFG.specialistProfile}，給每天最重要1–2個場次。\n【4.行前提示】一句話30字以內總結。\n請直接回答，不加前言。` }]
        })
      });
      const data = await resp.json();
      const result = data.content?.filter(b => b.type==="text").map(b => b.text).join("\n") || "無法取得分析結果";
      const now  = new Date().toLocaleString("zh-TW", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      const cpKey = daysLeft <= 1 ? "d1" : daysLeft <= 3 ? "d3" : daysLeft <= 7 ? "w1" : "manual";
      const upd  = { ...loadLS(UK), [cpKey]: { time: now, label, result }, lastCheck: { time: now, label } };
      saveLS(UK, upd); setUpdates(upd);
      showToast("更新完成");
    } catch {
      const now = new Date().toLocaleString("zh-TW", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      const upd = { ...loadLS(UK), lastCheck: { time: now, label, error: true } };
      saveLS(UK, upd); setUpdates(upd);
      showToast("更新失敗，請稍後重試");
    }
    setIsUpdating(false);
  }, [isUpdating, daysLeft]);

  // Auto-trigger checkpoints
  useEffect(() => {
    for (const cp of CHECKPOINTS) {
      if (daysLeft <= cp.days && daysLeft > 0 && !loadLS(UK)[cp.key]) {
        setHasDot(true);
        const t = setTimeout(() => fetchAndAnalyze(cp.label), 3000);
        return () => clearTimeout(t);
      }
    }
  }, []);

  // ── Exports ─────────────────────────────────────────────────────────────────
  const doExportHTML = () => {
    const html = generateExportHTML(loadLS(NK), loadLS(MK));
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([html], { type: "text/html;charset=utf-8" }));
    a.download = `${C_CFG.driveFolderName}_筆記_${new Date().toLocaleDateString("zh-TW").replace(/\//g,"-")}.html`;
    a.click();
    setExportDone(true); setTimeout(() => setExportDone(false), 3000);
    showToast("HTML 筆記已下載");
  };

  const doExportGoogleDoc = async () => {
    if (!accessTokenRef.current) { showToast("請先登入 Google 帳號"); return; }
    setExportingDoc(true);
    try {
      const url = await exportToGoogleDoc(accessTokenRef.current, loadLS(NK), loadLS(MK));
      window.open(url, "_blank");
      showToast("Google Doc 已建立");
    } catch (e) { showToast("建立 Google Doc 失敗：" + e.message); }
    setExportingDoc(false);
  };

  // ── S object (shared state for screens) ────────────────────────────────────
  const S = {
    daysLeft, tab, notes, media, reminders, updates, isUpdating, uploading, filter, expanded, curDay, syncStatus, accessToken, userEmail, tokenClient, exportingDoc,
    setFilter, setCurDay,
    saveNote,
    addMediaLink, removeMediaLink, handleCapture,
    toggleReminder: i => setRem(p => ({ ...p, [i]: !p[i] })),
    toggleExpand: id => setExpanded(p => ({ ...p, [id]: !p[id] })),
    goTo: t => setTab(t),
    goSession: id => { pendingScroll.current = id; setExpanded(p => ({ ...p, [id]: true })); setTab("sched"); },
    runUpdate: () => fetchAndAnalyze("手動更新"),
    doExportHTML, doExportGoogleDoc,
    toast: showToast,
  };

  const titles = { home: "會議助理", sched: "議程", notes: "我的筆記", updates: "行前更新" };
  const notesBadge = Object.keys(notes).length + Object.values(media).reduce((a, m) => a + hasMedCount(m), 0);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: T.paper, fontFamily: FONT_SANS, color: T.ink, position: "relative", overflow: "hidden" }}>

      {/* header */}
      <div style={{ paddingTop: "max(16px, env(safe-area-inset-top, 44px))", paddingBottom: 10, paddingLeft: 16, paddingRight: 16, background: T.paper, display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexShrink: 0, position: "relative", zIndex: 6 }}>
        <div style={{ fontFamily: FONT_SERIF, fontSize: 21, fontWeight: 700, color: T.ink, letterSpacing: ".3px" }}>{titles[tab]}</div>
        <button onClick={() => { setTab("updates"); setHasDot(false); }} style={{ display: "inline-flex", alignItems: "center", gap: 5, border: "none", cursor: "pointer", background: T.primaryTint, color: T.primary, borderRadius: 999, padding: "5px 11px", fontSize: 12, fontWeight: 700, fontFamily: FONT_SANS, whiteSpace: "nowrap", flexShrink: 0, position: "relative" }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: T.primary }} />
          開課倒數 {daysLeft} 天
          {hasDot && <span style={{ position: "absolute", top: -2, right: -2, width: 8, height: 8, borderRadius: "50%", background: "#EF4444", border: "1.5px solid "+T.paper }} />}
        </button>
      </div>

      {/* scroll area */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch" }}>
        <div style={{ paddingBottom: 8 }}>
          {tab === "home"    && <HomeScreen S={S} />}
          {tab === "sched"   && <ScheduleScreen S={S} />}
          {tab === "notes"   && <NotesScreen S={S} />}
          {tab === "updates" && <UpdatesScreen S={S} />}
        </div>
      </div>

      {/* bottom nav */}
      <div style={{ flexShrink: 0, display: "flex", paddingTop: 8, paddingBottom: "max(20px, env(safe-area-inset-bottom, 0px))", background: "rgba(255,255,255,.92)", backdropFilter: "blur(16px) saturate(180%)", WebkitBackdropFilter: "blur(16px) saturate(180%)", borderTop: `1px solid ${T.hair}`, position: "relative", zIndex: 6 }}>
        {[["home","home","首頁"], ["sched","calendar","議程"], ["notes","note","筆記"], ["updates","refresh","更新"]].map(([k, icon, label]) => {
          const on = tab === k;
          const badge = k === "notes" ? notesBadge : (k === "updates" && hasDot) ? 1 : 0;
          return (
            <button key={k} onClick={() => { setTab(k); if (k === "updates") setHasDot(false); }} style={{ flex: 1, border: "none", background: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "2px 0", fontFamily: FONT_SANS, position: "relative" }}>
              <div style={{ position: "relative" }}>
                <Icon name={icon} size={23} color={on ? T.primary : T.faint} stroke={on ? 2 : 1.7} />
                {badge > 0 && <span style={{ position: "absolute", top: -3, right: -8, minWidth: 15, height: 15, borderRadius: 999, background: k === "updates" ? "#EF4444" : T.gold, color: "#fff", fontSize: 9.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 3px" }}>{k === "updates" ? "!" : badge}</span>}
              </div>
              <span style={{ fontSize: 10.5, fontWeight: on ? 700 : 500, color: on ? T.primary : T.muted }}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* toast */}
      {toast && (
        <div style={{ position: "absolute", left: 0, right: 0, bottom: 96, display: "flex", justifyContent: "center", zIndex: 40, pointerEvents: "none" }}>
          <div style={{ background: T.ink, color: T.paper, fontSize: 12.5, fontWeight: 600, padding: "10px 16px", borderRadius: 999, boxShadow: "0 12px 30px -10px rgba(0,0,0,.4)", display: "inline-flex", alignItems: "center", gap: 7 }}>
            <Icon name="check" size={14} color={T.paper} stroke={2.4}/>{toast}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
