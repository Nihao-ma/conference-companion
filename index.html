// ══════════════════════════════════════════════════════════════════════════════
// 動態載入會議設定檔
// ══════════════════════════════════════════════════════════════════════════════
function loadScript(src) {
  return new Promise((resolve, reject) => {
    delete window.CONFERENCE_CONFIG;
    const s = document.createElement('script');
    s.src = src;
    s.onload  = () => resolve(window.CONFERENCE_CONFIG || null);
    s.onerror = () => reject(new Error('無法載入: ' + src));
    document.head.appendChild(s);
  });
}

async function loadAllConferences() {
  const configs = {};
  for (const { key, file } of CONFERENCE_REGISTRY) {
    try {
      const cfg = await loadScript(file);
      if (cfg) configs[key] = cfg;
    } catch(e) { console.warn(e.message); }
  }
  // 備援：若都失敗則嘗試 conference.js
  if (!Object.keys(configs).length) {
    try { const cfg = await loadScript('conference.js'); if (cfg) configs['default'] = cfg; } catch {}
  }
  return configs;
}

// 自動選最近的會議：優先選最近的未來場次，若全部過去則選最近已結束的
function autoSelectConference(configs) {
  const urlConf = new URLSearchParams(location.search).get('conf');
  if (urlConf && configs[urlConf]) return urlConf;

  const now = new Date();
  let bestKey = Object.keys(configs)[0];
  let bestScore = -Infinity;

  for (const [key, cfg] of Object.entries(configs)) {
    const diff = new Date(cfg.startDate) - now; // 正 = 未來
    // 未來場次優先，越近分數越高；過去場次其次
    const score = diff >= 0 ? 1e15 - diff : diff;
    if (score > bestScore) { bestScore = score; bestKey = key; }
  }
  return bestKey;
}

// ══════════════════════════════════════════════════════════════════════════════
// 將 CONFERENCE_CONFIG 結構轉換成 UI 用的 CONF 物件
// ══════════════════════════════════════════════════════════════════════════════
function buildCONF(cfg) {
  const DAY_KEYS = Object.keys(cfg.sessions || {});
  const ALL_BLOCKS = {};

  for (const dk of DAY_KEYS) {
    const blocks = [];
    for (const bl of cfg.sessions[dk] || []) {
      if (bl.brk) {
        const t = (bl.time||"").split(/[–—]/)[0].trim();
        blocks.push({ time: t, kind: "mark", label: bl.brk.replace(/^[📋☕👋⏰🍱🔔📅]\s*/,""), note:"" });
      } else if (bl.items) {
        const parts = (bl.time||"").split(/[–—]/);
        const st = parts[0].trim(), et = parts[1]?.trim()||"";
        for (const it of bl.items) {
          const pinM = (it.detail||"").match(/[⭐★]\s*(.+)$/m);
          blocks.push({
            time: st, end: et, id: it.id, b: it.b||"edu",
            title: it.title, speakers: it.speakers||[], tags: it.tags||[],
            detail: (it.detail||"").replace(/^[⭐★].*$/mg,"").trim(),
            pin: pinM ? pinM[1].trim() : "",
          });
        }
      }
    }
    ALL_BLOCKS[dk] = blocks;
  }

  return {
    name: cfg.name,
    org:  (cfg.subtitle||"").split("・")[0] || cfg.name,
    dates: cfg.dates,
    startDate: cfg.startDate,
    venue: (cfg.venue||cfg.location||"").split("，")[0],
    venueAddr: (cfg.venue||cfg.location||"").split("，")[1]||"",
    mapsUrl: cfg.mapsUrl,
    registration: cfg.registrationTimes?.[0]||"",
    credits: (cfg.personalReminders||[]).find(r=>r.includes("積分"))||"",
    reminders: cfg.personalReminders||[],
    links: cfg.links||[],
    checkpoints: cfg.checkpoints||[],
    days: cfg.days||{},
    dayKeys: DAY_KEYS,
    allBlocks: ALL_BLOCKS,
    badges: {
      edu:{ bg:"#EEF0FD", fg:"#3730A3", label:"講座" },
      int:{ bg:"#FFF6E8", fg:"#9A5B00", label:"討論" },
      sym:{ bg:"#ECFDF5", fg:"#065F46", label:"研討" },
      con:{ bg:"#EFF6FF", fg:"#1E40AF", label:"場次" },
      pl: { bg:"#FFF1EE", fg:"#7C2D12", label:"專題" },
      corp:{ bg:"#F5F5F4",fg:"#44403C", label:"場次" },
    },
    tags: {
      star:    { bg:"#FCF3DC",fg:"#9A6B00",glyph:"★",  label:"推薦" },
      prenatal:{ bg:"#E6F6F0",fg:"#0A6E50",glyph:"🧬", label:"產前" },
      cyto:    { bg:"#E8F1FF",fg:"#1E4FA8",glyph:"🔬", label:"細胞遺傳" },
      cardio:  { bg:"#FEE2E2",fg:"#991B1B",glyph:"❤",  label:"心臟" },
      neuro:   { bg:"#F3E8FF",fg:"#6B21A8",glyph:"🧠", label:"神經" },
    },
  };
}

// 啟用某個會議（更新全域可變變數）
function activateConference(cfg) {
  _C_CFG = cfg;
  _CONF  = buildCONF(cfg);
}

// DRIVE API (保留原版)
// ══════════════════════════════════════════════════════════════════════════════
async function driveGet(token, path, params="") {
  const r = await fetch(`https://www.googleapis.com/drive/v3/${path}${params}`,{headers:{Authorization:`Bearer ${token}`}});
  if (!r.ok) throw new Error(`Drive ${path} ${r.status}`); return r.json();
}
async function findFile(token, name, parentId) {
  const safe = name.replace(/'/g,"\\'");
  let q=`name='${safe}' and trashed=false`;
  if (parentId) q+=` and '${parentId}' in parents`;
  const d=await driveGet(token,"files",`?q=${encodeURIComponent(q)}&fields=files(id,name,webViewLink)`);
  return d.files?.[0]||null;
}
async function createFolder(token, name, parentId) {
  const meta={name,mimeType:"application/vnd.google-apps.folder"};
  if (parentId) meta.parents=[parentId];
  const r=await fetch("https://www.googleapis.com/drive/v3/files",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(meta)});
  if (!r.ok) throw new Error("createFolder failed"); return r.json();
}
const getOrCreateFolder=(t,n,p)=>findFile(t,n,p).then(f=>f||createFolder(t,n,p));
async function readJsonFile(token,fileId){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});
  if (!r.ok) return null; return r.json();
}
async function writeJsonFile(token,name,data,parentId,existingId){
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const metaObj={name,mimeType:"application/json"};
  if (parentId&&!existingId) metaObj.parents=[parentId];
  const form=new FormData();
  form.append("metadata",new Blob([JSON.stringify(metaObj)],{type:"application/json"}));
  form.append("file",blob);
  const url=existingId?`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`:"https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
  const r=await fetch(url,{method:existingId?"PATCH":"POST",headers:{Authorization:`Bearer ${token}`},body:form});
  if (!r.ok) throw new Error("writeJsonFile failed"); return r.json();
}
async function uploadMediaFile(token,file,sessionTitle){
  const cfg=getCFG();
  const rootFolder=await getOrCreateFolder(token,cfg.driveFolderName,null);
  const folderName=sessionTitle.replace(/[★\*\/\\:]/g,"").trim().substring(0,40);
  const sessionFolder=await getOrCreateFolder(token,folderName,rootFolder.id);
  const ts=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}).replace(":","");
  const meta=JSON.stringify({name:`${ts}_${file.name}`,parents:[sessionFolder.id]});
  const form=new FormData();
  form.append("metadata",new Blob([meta],{type:"application/json"}));
  form.append("file",file);
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,name",{method:"POST",headers:{Authorization:`Bearer ${token}`},body:form});
  if (!r.ok) throw new Error("Upload failed");
  const d=await r.json();
  await fetch(`https://www.googleapis.com/drive/v3/files/${d.id}/permissions`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({role:"reader",type:"anyone"})});
  return d;
}
async function exportToGoogleDoc(token,notes,media){
  const cfg=getCFG(); const conf=getCONF();
  const r=await fetch("https://docs.googleapis.com/v1/documents",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({title:`${cfg.name} 會議筆記`})});
  if (!r.ok) throw new Error("無法建立 Google Doc");
  const {documentId}=await r.json();
  const lines=[`${cfg.name} 會議筆記`,cfg.subtitle||"",`匯出：${new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"})}`,""];
  for(const[day,blocks]of Object.entries(cfg.sessions||{})){
    for(const bl of blocks){
      if(!bl.items) continue;
      for(const it of bl.items){
        const note=notes[it.id]; const med=media[it.id]||{};
        if(!note&&!med.driveLinks?.length&&!med.videoLinks?.length) continue;
        lines.push(`▌ ${bl.time}  ${it.title}`);
        if(it.speakers?.length) lines.push(`   講者：${it.speakers.join(" / ")}`);
        if(note){lines.push("");lines.push("📝 筆記：");lines.push(note);}
        if(med.driveLinks?.length){lines.push("");lines.push("📷 照片：");for(const lk of med.driveLinks)lines.push(`   ${lk.label}：${lk.url}`);}
        if(med.videoLinks?.length){lines.push("");lines.push("🎥 影片：");for(const vl of med.videoLinks)lines.push(`   ${vl.label}：${vl.url}`);}
        lines.push("");
      }
    }
  }
  await fetch(`https://docs.googleapis.com/v1/documents/${documentId}:batchUpdate`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({requests:[{insertText:{location:{index:1},text:lines.join("\n")}}]})});
  return `https://docs.google.com/document/d/${documentId}/edit`;
}
function generateExportHTML(notes,media){

  const sections=[];

      if(!bl.items) continue;
      for(const it of bl.items){
        const note=notes[it.id];const med=media[it.id]||{};
        if(!note&&!med.driveLinks?.length&&!med.videoLinks?.length) continue;
        const bc=conf.badges[it.b]||conf.badges.edu;
        let h=`<div class="si"><div class="sh"><span class="badge" style="background:${bc.bg};color:${bc.fg}">${bc.label}</span><div><div class="stl">${bl.time}</div><div class="stt">${it.title}</div>${it.speakers?.length?`<div class="spk">${it.speakers.join(" · ")}</div>`:""}</div></div>`;
        if(note) h+=`<div class="nb"><div class="nl">📝 筆記</div><div class="nt">${note.replace(/\n/g,"<br>")}</div></div>`;
        if(med.driveLinks?.length){h+=`<div class="mb"><div class="nl">📷</div>`;for(const lk of med.driveLinks)h+=`<a class="dl" href="${lk.url}" target="_blank">📷 ${lk.label}</a>`;h+=`</div>`;}
        if(med.videoLinks?.length){h+=`<div class="mb"><div class="nl">🎥</div>`;for(const vl of med.videoLinks)h+=`<a class="dl" href="${vl.url}" target="_blank">▶ ${vl.label}</a>`;h+=`</div>`;}
        h+=`</div>`;items.push(h);
      }
    }
    if(items.length) sections.push(`<div class="ds"><div class="dh">${conf.days[day]||day}</div>${items.join("")}</div>`);
  }
  const nc=Object.keys(notes).length,mc=Object.values(media).reduce((a,m)=>a+(m.driveLinks?.length||0)+(m.videoLinks?.length||0),0);
  return `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${cfg.name} 會議筆記</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#FAFAF8;color:#1C1917}.cov{background:linear-gradient(135deg,#312E81,#4338CA);color:#fff;padding:52px 36px 44px}.ct{font-size:34px;font-weight:700;margin-bottom:6px}.cs{font-size:14px;opacity:.7}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:720px;margin:32px auto 0;padding:0 20px}.stat{background:#fff;border:1px solid #E7E5E4;border-radius:10px;padding:14px;text-align:center}.sn{font-size:26px;font-weight:700;color:#312E81}.sl{font-size:11px;color:#78716C;margin-top:2px}.con{max-width:720px;margin:0 auto;padding:32px 20px 80px}.ds{margin-bottom:36px}.dh{font-size:18px;font-weight:700;color:#312E81;padding:10px 0;border-bottom:2px solid #312E81;margin-bottom:16px}.si{background:#fff;border:1px solid #E7E5E4;border-radius:12px;padding:18px;margin-bottom:12px}.sh{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0}.stl{font-size:10px;color:#A8A29E}.stt{font-size:14px;font-weight:600;line-height:1.4}.spk{font-size:11px;color:#78716C;margin-top:3px}.nb{background:#FAFAF8;border-left:3px solid #312E81;border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:8px}.nl{font-size:10px;font-weight:700;color:#A8A29E;margin-bottom:5px}.nt{font-size:13px;line-height:1.7;white-space:pre-wrap}.mb{margin-bottom:8px}.dl{display:inline-flex;background:#EEF0FD;color:#3730A3;border-radius:6px;padding:5px 10px;font-size:12px;text-decoration:none;margin:2px}</style></head><body><div class="cov"><div class="ct">${cfg.name}</div><div class="cs">${cfg.subtitle||""}</div><div style="font-size:12px;opacity:.5;margin-top:6px">📅 ${cfg.dates}　🗓 匯出於 ${now}</div></div><div class="stats"><div class="stat"><div class="sn">${nc}</div><div class="sl">則文字筆記</div></div><div class="stat"><div class="sn">${mc}</div><div class="sl">個媒體連結</div></div><div class="stat"><div class="sn">${sections.length}</div><div class="sl">天有記錄</div></div></div><div class="con">${sections.length?sections.join(""):`<div style="text-align:center;padding:60px;color:#bbb">📭 尚無筆記</div>`}</div></body></html>`;
}

    link:     <><path d="M9.5 14.5l5-5M8 11l-2 2a3.5 3.5 0 0 0 5 5l2-2M16 13l2-2a3.5 3.5 0 0 0-5-5l-2 2" {...p}/></>,
    map:      <><path d="M9 4.5 3.5 6.8v13L9 17.2l6 2.3 5.5-2.3v-13L15 6.8 9 4.5Z" {...p}/><path d="M9 4.5v12.7M15 6.8v12.7" {...p}/></>,
    user:     <><circle cx="12" cy="8" r="3.6" {...p}/><path d="M5.5 20a6.5 6.5 0 0 1 13 0" {...p}/></>,
    star:     <path d="M12 3.5l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.9 6.8 19.5l1-5.8-4.2-4.1 5.8-.8L12 3.5Z" fill="none" stroke={color} strokeWidth={stroke} strokeLinejoin="round"/>,
    arrowR:   <path d="M5 12h14M13 6l6 6-6 6" {...p}/>,
    video:    <><path d="M4 8a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2H4Z" {...p}/><path d="M16 10l4-2v8l-4-2V10Z" {...p}/></>,
    swap:     <><path d="M7 16V4M7 4L4 7M7 4l3 3" {...p}/><path d="M17 8v12M17 20l-3-3M17 20l3-3" {...p}/></>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" style={{display:"block"}}>{paths[name]}</svg>;
}

function CountRing({ days, size=64 }) {
  const r=(size-8)/2, c=2*Math.PI*r, frac=Math.max(0,Math.min(1,(7-days)/7));
  return (
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.22)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#fff" strokeWidth="4" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c*(1-frac)} style={{transition:"stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff"}}>
        <div style={{fontSize:24,fontWeight:700,lineHeight:1,fontFamily:FONT_SERIF}}>{days}</div>
        <div style={{fontSize:9.5,opacity:.8,marginTop:1}}>天</div>
      </div>
    </div>
  );
}

function TagChip({ t, small }) {
  const conf=getCONF(); const cfg=conf?.tags[t]; if (!cfg) return null;
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:small?10.5:11.5,fontWeight:600,lineHeight:1,padding:small?"3px 7px":"4px 8px",borderRadius:7,background:cfg.bg,color:cfg.fg,fontFamily:FONT_SANS}}>
      <span style={{fontSize:small?9:10}}>{cfg.glyph}</span>{cfg.label}
    </span>
  );
}
function TypeBadge({ b }) {
  const conf=getCONF(); const cfg=conf?.badges[b]||conf?.badges.edu||{bg:"#EEF0FD",fg:"#3730A3",label:"講座"};
  return <span style={{fontSize:11,fontWeight:700,letterSpacing:".5px",padding:"3px 8px",borderRadius:6,background:cfg.bg,color:cfg.fg,fontFamily:FONT_SANS,flexShrink:0}}>{cfg.label}</span>;
}
function Card({ children, style, onClick, pad=16 }) {
  return <div onClick={onClick} style={{background:T.surface,borderRadius:T.r,padding:pad,border:`1px solid ${T.hair}`,boxShadow:"0 1px 2px rgba(27,25,48,.04), 0 6px 16px -10px rgba(27,25,48,.10)",...style}}>{children}</div>;
}
function SectionHead({ children, action }) {
  return (
    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",margin:"22px 4px 11px"}}>
      <div style={{fontSize:12.5,fontWeight:700,letterSpacing:".8px",color:T.muted,fontFamily:FONT_SANS}}>{children}</div>
      {action}
    </div>

}

// 會議切換 Sheet
// ══════════════════════════════════════════════════════════════════════════════
function ConferenceSwitcher({ allConfigs, activeKey, onSelect, onClose }) {
  const now = new Date();

  const statusOf = (cfg) => {
    const diff = Math.ceil((new Date(cfg.startDate) - now) / 86400000);
    if (diff > 0)  return { label: `${diff} 天後`, color: T.primary, bg: T.primaryTint };
    if (diff === 0) return { label: "今天",       color: "#9A6B00", bg: "#FCF3DC" };
    return              { label: `${-diff} 天前`, color: T.muted,   bg: T.surfaceAlt };
  };

  return (
    <>
      {/* overlay */}
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:60,WebkitBackdropFilter:"blur(4px)",backdropFilter:"blur(4px)"}}/>
      {/* sheet */}
      <div className="cc-sheet" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:61,background:T.surface,borderRadius:"24px 24px 0 0",paddingBottom:"max(28px,env(safe-area-inset-bottom,0px))",boxShadow:"0 -20px 60px rgba(27,25,48,.18)"}}>
        {/* handle */}
        <div style={{width:36,height:4,borderRadius:2,background:T.hair,margin:"14px auto 0"}}/>

        <div style={{padding:"18px 20px 4px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:17,fontWeight:700,color:T.ink,fontFamily:FONT_SERIF}}>切換會議</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:20,lineHeight:1,padding:"4px 6px"}}>×</button>
        </div>

        <div style={{padding:"4px 20px 8px"}}>
          {Object.entries(allConfigs).map(([key, cfg], i, arr) => {
            const st = statusOf(cfg);
            const isActive = key === activeKey;
            return (
              <div key={key} onClick={() => onSelect(key)} style={{
                display:"flex",alignItems:"center",gap:14,padding:"15px 0",cursor:"pointer",
                borderBottom: i < arr.length-1 ? `1px solid ${T.hair}` : "none",
              }}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:FONT_SERIF,fontSize:16,fontWeight:700,color:isActive?T.primary:T.ink,lineHeight:1.3}}>{cfg.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:5}}>
                    <span style={{fontSize:12,color:T.muted}}>{cfg.dates}</span>
                    <span style={{fontSize:11,fontWeight:700,color:st.color,background:st.bg,padding:"2px 8px",borderRadius:999}}>{st.label}</span>
                  </div>
                  {cfg.venue && <div style={{fontSize:11.5,color:T.faint,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(cfg.venue||cfg.location||"").split("，")[0]}</div>}
                </div>
                {isActive
                  ? <div style={{width:26,height:26,borderRadius:"50%",background:T.primary,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="check" size={14} color="#fff" stroke={2.5}/></div>
                  : <div style={{width:26,height:26,borderRadius:"50%",border:`2px solid ${T.hair}`,flexShrink:0}}/>
                }
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

function FilterBar({ filter, setFilter, counts }) {
  const chips=[["all","全部",counts.all],["star","★ 推薦",counts.star],["prenatal","產前",counts.prenatal],["cyto","細胞遺傳",counts.cyto],["notes","我的筆記",counts.notes]].filter(([k,,n])=>k==="all"||k==="notes"||n>0);
  return (
    <div style={{display:"flex",gap:7,overflowX:"auto",padding:"2px 16px 2px",WebkitOverflowScrolling:"touch"}}>
      {chips.map(([k,label,n])=>{
        const on=filter===k;
        return <button key={k} onClick={()=>setFilter(k)} style={{flexShrink:0,border:"none",cursor:"pointer",fontFamily:FONT_SANS,fontSize:12.5,fontWeight:600,padding:"7px 13px",borderRadius:999,background:on?T.primary:T.surface,color:on?T.onPrimary:T.ink2,boxShadow:on?"none":`inset 0 0 0 1px ${T.hair}`,transition:"all .15s"}}>
          {label}{typeof n==="number"&&n>0&&<span style={{opacity:on?.8:.5,marginLeft:5}}>{n}</span>}
        </button>;
      })}
    </div>
  );
}

function ScheduleScreen({ S }) {
  const conf = getCONF();
  const { notes, media, filter, setFilter, expanded, toggleExpand, curDay, setCurDay } = S;
  const blocks = conf.allBlocks[curDay] || [];
  const sessions = blocks.filter(b=>b.id);
  const hmc = m => (m?.driveLinks?.length||0)+(m?.videoLinks?.length||0);
  const counts = {
    all: sessions.length,
    star: sessions.filter(s=>s.tags.includes("star")).length,
    prenatal: sessions.filter(s=>s.tags.includes("prenatal")).length,
    cyto: sessions.filter(s=>s.tags.includes("cyto")).length,
    notes: sessions.filter(s=>notes[s.id]||hmc(media[s.id])).length,
  };
  const matches = s => { if(filter==="all")return true; if(filter==="notes")return notes[s.id]||hmc(media[s.id]); return s.tags.includes(filter); };

  return (
    <div>
      <div style={{position:"sticky",top:0,zIndex:4,background:T.paper,paddingTop:4,paddingBottom:8}}>
        {conf.dayKeys.length > 1 && (
          <div style={{display:"flex",gap:6,padding:"0 16px 10px",overflowX:"auto"}}>
            {conf.dayKeys.map(dk => {
              const on=dk===curDay;
              return <button key={dk} onClick={()=>setCurDay(dk)} style={{flexShrink:0,border:"none",cursor:"pointer",fontFamily:FONT_SANS,fontSize:12.5,fontWeight:600,padding:"6px 14px",borderRadius:999,background:on?T.primaryTint:"transparent",color:on?T.primary:T.muted}}>{conf.days[dk]||dk}</button>;
            })}
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 16px 10px"}}>
          <div style={{fontFamily:FONT_SERIF,fontSize:15,fontWeight:700,color:T.ink}}>{conf.days[curDay]||curDay}</div>
          <div style={{fontSize:11.5,color:T.muted}}>· {sessions.length} 場</div>
        </div>
        <FilterBar filter={filter} setFilter={setFilter} counts={counts}/>
      </div>
      <div style={{padding:"6px 16px 24px"}}>
        <div style={{position:"relative"}}>
          <div style={{position:"absolute",left:47,top:8,bottom:8,width:2,background:T.hair}}/>
          {blocks.map((b,i)=>{
            if (b.kind==="mark") return <Marker key={i} b={b}/>;
            if (!matches(b)) return null;
            return <SessionCard key={b.id} b={b} S={S}/>;
          })}
        </div>
        {sessions.filter(matches).length===0 && (
          <div style={{textAlign:"center",padding:"48px 20px",color:T.faint}}>
            <div style={{display:"inline-flex",marginBottom:10}}><Icon name="note" size={30} color={T.faint}/></div>
            <div style={{fontSize:13}}>此分類目前沒有場次</div>
          </div>
        )}
      </div>
    </div>
  );
}

      <div style={{width:47,textAlign:"right",paddingRight:13,fontSize:11.5,color:T.faint,fontWeight:600,fontFamily:FONT_SERIF}}>{b.time}</div>
      <div style={{width:11,height:11,borderRadius:"50%",background:T.paper,border:`2px solid ${T.faint}`,flexShrink:0,zIndex:1,marginLeft:-5.5}}/>

        {b.note && <span style={{fontSize:11,color:T.faint}}>{b.note}</span>}
      </div>

}

function SessionCard({ b, S }) {
  const { notes, saveNote, media, removeMediaLink, accessToken, uploading, handleCapture, expanded, toggleExpand, syncStatus } = S;
  const open=!!expanded[b.id];
  const hasNote=!!notes[b.id];
  const med=media[b.id]||{driveLinks:[],videoLinks:[]};
  const medCount=(med.driveLinks?.length||0)+(med.videoLinks?.length||0);
  const hasMed=medCount>0;
  const [draft,setDraft]=useState(notes[b.id]||"");
  const [saved,setSaved]=useState(false);
  const isUploading=!!uploading[b.id];
  const cameraRef=useRef(null); const videoRef=useRef(null); const libRef=useRef(null);
  useEffect(()=>{ if(open) setDraft(notes[b.id]||""); },[open]);
  const accent=hasNote?T.gold:hasMed?T.primary:null;
  const save=()=>{ saveNote(b.id,draft.trim()); setSaved(true); setTimeout(()=>setSaved(false),1600); };
  function btnSt(kind){
    const base={border:"none",cursor:"pointer",borderRadius:9,padding:"8px 15px",fontSize:12.5,fontWeight:600,fontFamily:FONT_SANS};
    if(kind==="solid") return {...base,background:T.primary,color:T.onPrimary};
    if(kind==="disabled") return {...base,background:T.surfaceAlt,color:T.faint,cursor:"default"};
    return {...base,background:"transparent",color:T.muted,border:`1px solid ${T.hair}`};
  }
  return (
    <div id={"sess-"+b.id} style={{display:"flex",marginBottom:10,position:"relative",scrollMarginTop:80}}>
      <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{handleCapture(b.id,b.title,e.target);e.target.value="";}}/>
      <input ref={videoRef}  type="file" accept="video/*" capture="environment" style={{display:"none"}} onChange={e=>{handleCapture(b.id,b.title,e.target);e.target.value="";}}/>
      <input ref={libRef}    type="file" accept="image/*,video/*" multiple      style={{display:"none"}} onChange={e=>{handleCapture(b.id,b.title,e.target);e.target.value="";}}/>
      <div style={{width:47,flexShrink:0,textAlign:"right",paddingRight:13,paddingTop:13}}>
        <div style={{fontFamily:FONT_SERIF,fontSize:14.5,fontWeight:700,color:T.primary,lineHeight:1}}>{b.time}</div>
        <div style={{fontSize:10,color:T.faint,marginTop:3}}>{b.end}</div>
      </div>

                {hasMed  && <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10.5,fontWeight:600,color:T.primary}}><Icon name="camera" size={12} color={T.primary}/>{medCount}</span>}

              <div style={{fontSize:14,fontWeight:600,color:T.ink,lineHeight:1.42,letterSpacing:".1px"}}>{b.title}</div>

                <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11.5,color:T.muted,fontWeight:500}}><Icon name="user" size={12} color={T.muted}/>{b.speakers.join("、")}</span>
              </div>
              {b.tags.length>0 && <div style={{marginTop:8,display:"flex",gap:5,flexWrap:"wrap"}}>{b.tags.map(t=><TagChip key={t} t={t} small/>)}</div>}

            <span style={{color:T.faint,marginTop:2,transform:open?"rotate(90deg)":"none",transition:"transform .2s",flexShrink:0}}><Icon name="chevR" size={16} color={T.faint}/></span>
          </div>
          {open && (
            <div style={{padding:"0 14px 14px",borderTop:`1px solid ${T.hair2}`}} onClick={e=>e.stopPropagation()}>
              {b.pin && <div style={{display:"flex",gap:7,alignItems:"flex-start",background:T.goldTint,borderRadius:10,padding:"9px 11px",marginTop:12}}><span style={{marginTop:1,flexShrink:0}}><Icon name="star" size={13} color={T.gold}/></span><div style={{fontSize:12,fontWeight:600,color:T.gold,lineHeight:1.45}}>{b.pin}</div></div>}
              {b.detail && <div style={{fontSize:12.5,color:T.ink2,lineHeight:1.7,marginTop:12,whiteSpace:"pre-line"}}>{b.detail}</div>}

                  {b.speakers.map(sp=>(
                    <span key={sp} style={{display:"inline-flex",alignItems:"center",gap:6,background:T.surfaceAlt,border:`1px solid ${T.hair}`,borderRadius:999,padding:"5px 11px 5px 6px",fontSize:12,color:T.ink2,fontWeight:500}}>
                      <span style={{width:20,height:20,borderRadius:"50%",background:T.primaryTint,color:T.primary,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{sp[0]}</span>{sp}
                    </span>
                  ))}

              </div>
              <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.hair2}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11.5,fontWeight:700,letterSpacing:".4px",color:T.muted}}><Icon name="note" size={13} color={T.muted}/>我的筆記</div>
                  {accessToken && <SyncPill saved={saved} syncing={syncStatus==="syncing"}/>}
                </div>
                <textarea value={draft} onChange={e=>setDraft(e.target.value)} placeholder="記錄重點、問題、要追問的細節…" style={{width:"100%",boxSizing:"border-box",border:`1px solid ${T.hair}`,borderRadius:11,padding:"11px 12px",fontSize:13,background:T.surfaceAlt,color:T.ink,resize:"vertical",minHeight:76,fontFamily:FONT_SANS,lineHeight:1.6,outline:"none"}}/>
                <div style={{display:"flex",justifyContent:"flex-end",gap:7,marginTop:8}}>
                  {hasNote && <button onClick={()=>{setDraft("");saveNote(b.id,"");}} style={btnSt("ghost")}>清除</button>}
                  <button onClick={save} disabled={draft.trim()===(notes[b.id]||"")} style={btnSt(draft.trim()===(notes[b.id]||"")?"disabled":"solid")}>{saved?"已儲存 ✓":"儲存筆記"}</button>
                </div>
              </div>
              <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.hair2}`}}>
                <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11.5,fontWeight:700,letterSpacing:".4px",color:T.muted,marginBottom:9}}>
                  <Icon name="camera" size={13} color={T.muted}/>照片 / 影片
                  {accessToken && <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10.5,fontWeight:600,color:T.primary,marginLeft:2}}><Icon name="cloudCheck" size={12} color={T.primary}/>已連 Drive</span>}
                </div>
                {accessToken ? isUploading ? (
                  <div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:10,padding:11,fontSize:13,fontWeight:600,textAlign:"center",color:"#16A34A",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    <div className="cc-spin" style={{width:16,height:16,borderRadius:"50%",border:"2.5px solid #86EFAC",borderTopColor:"#16A34A",flexShrink:0}}/>上傳中…
                  </div>

                  <div style={{display:"flex",gap:7}}>
                    {[["camera","拍照",cameraRef],["video","錄影",videoRef],["download","批次",libRef]].map(([icon,label,ref])=>(
                      <button key={label} onClick={()=>ref.current?.click()} style={{flex:1,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,border:`1px solid ${T.hair}`,background:T.surface,color:T.ink2,cursor:"pointer",borderRadius:10,padding:"9px 0",fontSize:12.5,fontWeight:600,fontFamily:FONT_SANS}}>
                        <Icon name={icon} size={15} color={T.primary}/>{label}
                      </button>
                    ))}
                  </div>
                ) : (
                  <div style={{fontSize:12,color:T.faint,background:T.surfaceAlt,borderRadius:10,padding:"10px 12px",lineHeight:1.5}}>連接 Google Drive 後可直接拍照上傳。前往「筆記」分頁連接。</div>
                )}
                {(med.driveLinks?.length>0||med.videoLinks?.length>0) && (
                  <div style={{marginTop:9,display:"flex",flexDirection:"column",gap:6}}>
                    {(med.driveLinks||[]).map((lk,i)=>(
                      <div key={"d"+i} style={{display:"flex",alignItems:"center",gap:8,background:T.surfaceAlt,borderRadius:9,padding:"8px 10px"}}>
                        <Icon name="camera" size={15} color={T.primary}/>
                        <a href={lk.url} target="_blank" rel="noreferrer" style={{flex:1,fontSize:12,color:T.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:"none"}}>{lk.label}</a>
                        <button onClick={()=>removeMediaLink(b.id,"drive",i)} style={{background:"none",border:"none",color:T.faint,cursor:"pointer",fontSize:17,lineHeight:1,padding:"0 2px"}}>×</button>
                      </div>
                    ))}
                    {(med.videoLinks||[]).map((vl,i)=>(
                      <div key={"v"+i} style={{display:"flex",alignItems:"center",gap:8,background:T.surfaceAlt,borderRadius:9,padding:"8px 10px"}}>
                        <Icon name="video" size={15} color="#7C3AED"/>
                        <a href={vl.url} target="_blank" rel="noreferrer" style={{flex:1,fontSize:12,color:"#7C3AED",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:"none"}}>{vl.label}</a>
                        <button onClick={()=>removeMediaLink(b.id,"video",i)} style={{background:"none",border:"none",color:T.faint,cursor:"pointer",fontSize:17,lineHeight:1,padding:"0 2px"}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SyncPill({ saved, syncing }) {
  const color=saved?"#0A6E50":syncing?"#B45309":T.muted;
  const bg=saved?"#E6F6F0":syncing?"#FEF3C7":T.surfaceAlt;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:10.5,fontWeight:600,color,background:bg,padding:"3px 8px",borderRadius:999,transition:"all .2s"}}><Icon name={saved?"cloudCheck":syncing?"refresh":"cloud"} size={12} color={color}/>{saved?"已同步":syncing?"同步中":"雲端"}</span>;
}

// ══════════════════════════════════════════════════════════════════════════════
// NOTES SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function NotesScreen({ S }) {
  const conf=getCONF();
  const { notes, media, accessToken, userEmail, syncStatus, tokenClient, goSession, doExportHTML, doExportGoogleDoc, exportingDoc } = S;
  const allSessions=Object.values(conf.allBlocks).flat().filter(b=>b.id);
  const hmc=m=>(m?.driveLinks?.length||0)+(m?.videoLinks?.length||0);
  const recorded=allSessions.filter(s=>notes[s.id]||hmc(media[s.id]));
  const noteCount=allSessions.filter(s=>notes[s.id]).length;
  const mediaCount=allSessions.reduce((a,s)=>a+hmc(media[s.id]||{}),0);

  return (
    <div style={{padding:"4px 16px 24px"}}>
      {accessToken ? (
        <div style={{display:"flex",alignItems:"center",gap:12,background:"#E6F6F0",border:"1px solid #BBE6D6",borderRadius:16,padding:"13px 15px"}}>
          <div style={{width:38,height:38,borderRadius:11,background:"#0A6E50",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="cloudCheck" size={20} color="#fff"/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13.5,fontWeight:700,color:"#0A6E50"}}>已連接 Google Drive</div>
            <div style={{fontSize:11.5,color:T.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userEmail||"已登入"} · {syncStatus==="syncing"?"同步中…":"自動同步至 "+getCFG()?.driveFolderName+"/"}</div>
          </div>
        </div>
      ) : (
        <div style={{background:`linear-gradient(150deg, ${T.heroFrom}, ${T.heroTo})`,borderRadius:18,padding:"17px 17px",boxShadow:"0 14px 32px -20px rgba(49,46,129,.8)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><Icon name="cloud" size={19} color="#fff"/><div style={{fontSize:14.5,fontWeight:700,color:"#fff"}}>連接 Google Drive</div></div>
          <div style={{fontSize:12.5,color:"rgba(255,255,255,.78)",lineHeight:1.55,margin:"8px 0 13px"}}>登入後可跨裝置同步筆記、直接拍照上傳 Drive、一鍵匯出為 Google Doc。</div>
          <button onClick={()=>tokenClient?.requestAccessToken()} disabled={!tokenClient} style={{width:"100%",border:"none",cursor:tokenClient?"pointer":"not-allowed",borderRadius:11,padding:"11px 0",fontSize:13.5,fontWeight:700,background:"#fff",color:T.primaryDeep,fontFamily:FONT_SANS,opacity:tokenClient?1:.6}}>
            {tokenClient?"使用 Google 帳號登入":"⏳ 載入中…"}
          </button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9,marginTop:14}}>
        {[[noteCount,"文字筆記"],[mediaCount,"媒體連結"],[recorded.length,"場次有記錄"]].map(([n,l],i)=>(
          <div key={i} style={{background:T.surface,border:`1px solid ${T.hair}`,borderRadius:14,padding:"14px 8px",textAlign:"center",boxShadow:"0 1px 2px rgba(27,25,48,.04)"}}>
            <div style={{fontFamily:FONT_SERIF,fontSize:26,fontWeight:700,color:T.primary,lineHeight:1}}>{n}</div>
            <div style={{fontSize:10.5,color:T.muted,marginTop:5}}>{l}</div>
          </div>
        ))}
      </div>
      <SectionHead>已記錄場次</SectionHead>
      {recorded.length===0 ? (
        <div style={{textAlign:"center",padding:"40px 20px",color:T.faint}}>
          <div style={{display:"inline-flex",marginBottom:10}}><Icon name="note" size={30} color={T.faint}/></div>
          <div style={{fontSize:13,lineHeight:1.6}}>尚無筆記。<br/>在「議程」中展開任一場次即可開始記錄。</div>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {recorded.map(s=>{
            const med=media[s.id]||{};
            return (
              <Card key={s.id} pad={14} onClick={()=>goSession(s.id)} style={{cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <TypeBadge b={s.b}/><span style={{fontSize:11,color:T.faint,fontFamily:FONT_SERIF,fontWeight:700}}>{s.time}</span>
                  <span style={{marginLeft:"auto"}}><Icon name="chevR" size={15} color={T.faint}/></span>
                </div>
                <div style={{fontSize:13.5,fontWeight:600,color:T.ink,lineHeight:1.4}}>{s.title}</div>
                {notes[s.id] && <div style={{marginTop:9,background:T.surfaceAlt,borderLeft:`3px solid ${T.gold}`,borderRadius:"0 8px 8px 0",padding:"9px 11px",fontSize:12.5,color:T.ink2,lineHeight:1.6,whiteSpace:"pre-line",display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{notes[s.id]}</div>}
                {(med.driveLinks?.length>0||med.videoLinks?.length>0) && (
                  <div style={{marginTop:9,display:"flex",gap:6,flexWrap:"wrap"}}>
                    {(med.driveLinks||[]).map((_,i)=><span key={"d"+i} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,color:T.primary,background:T.primaryTint,borderRadius:7,padding:"4px 8px"}}><Icon name="camera" size={11} color={T.primary}/>照片</span>)}
                    {(med.videoLinks||[]).map((_,i)=><span key={"v"+i} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,color:"#7C3AED",background:"#F1E9FE",borderRadius:7,padding:"4px 8px"}}><Icon name="video" size={11} color="#7C3AED"/>影片</span>)}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}
      <SectionHead>匯出</SectionHead>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <ExportBtn icon="download" label="下載 HTML" sub="可離線・可列印" onClick={doExportHTML}/>
        <ExportBtn icon="doc" label="Google Doc" sub={accessToken?"建立雲端文件":"需先連接 Drive"} dim={!accessToken} loading={exportingDoc} onClick={()=>accessToken?doExportGoogleDoc():tokenClient?.requestAccessToken()}/>
      </div>
    </div>
  );
}
function ExportBtn({ icon, label, sub, onClick, dim, loading }) {
  return (
    <div onClick={!loading?onClick:undefined} style={{cursor:loading?"default":"pointer",background:T.surface,border:`1px solid ${T.hair}`,borderRadius:15,padding:"15px",opacity:dim?.6:1,boxShadow:"0 1px 2px rgba(27,25,48,.04)"}}>
      {loading?<div className="cc-spin" style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${T.hair}`,borderTopColor:T.primary}}/>:<Icon name={icon} size={20} color={T.primary}/>}
      <div style={{marginTop:9,fontSize:14,fontWeight:700,color:T.ink}}>{label}</div>
      <div style={{fontSize:11,color:T.muted,marginTop:1}}>{loading?"處理中…":sub}</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// UPDATES SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function UpdatesScreen({ S }) {
  const conf=getCONF();
  const { daysLeft, updates, isUpdating, runUpdate } = S;
  const lastCheck=updates.lastCheck;
  const latestResult=[...conf.checkpoints].reverse().find(cp=>updates[cp.key]);
  return (
    <div style={{padding:"4px 16px 24px"}}>
      <div style={{background:T.surface,border:`1px solid ${T.hair}`,borderRadius:16,padding:"15px 16px",boxShadow:"0 1px 2px rgba(27,25,48,.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:12,background:T.primaryTint,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="spark" size={21} color={T.primary}/></div>
          <div style={{flex:1}}>
            <div style={{fontSize:14.5,fontWeight:700,color:T.ink}}>智慧行前更新</div>
            <div style={{fontSize:12,color:T.muted,marginTop:1}}>AI 自動比對官網・距開課 <b style={{color:T.primary}}>{daysLeft}</b> 天</div>
          </div>
        </div>
      </div>
      <SectionHead>自動檢查點</SectionHead>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
        {conf.checkpoints.map(cp=>{
          const done=!!updates[cp.key], active=!done&&daysLeft<=cp.days+1&&daysLeft>0;
          return (
            <div key={cp.key} style={{background:done?"#E6F6F0":T.surface,border:`1px solid ${done?"#0A6E5055":active?T.primary+"66":T.hair}`,borderRadius:13,padding:"12px 9px",textAlign:"center"}}>
              <div style={{width:26,height:26,borderRadius:"50%",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",background:done?"#0A6E50":active?T.primary:T.surfaceAlt}}>
                <Icon name={done?"check":"clock"} size={14} color={done||active?"#fff":T.faint} stroke={2.2}/>
              </div>
              <div style={{fontSize:11.5,fontWeight:700,color:done?"#0A6E50":active?T.primary:T.ink2,marginTop:7}}>{cp.label}</div>
              <div style={{fontSize:10,color:T.muted,marginTop:2,lineHeight:1.35}}>{done?"✓ 已完成":daysLeft<=cp.days?"建議執行":`還有 ${daysLeft-cp.days} 天`}</div>
            </div>
          );
        })}
      </div>
      <SectionHead action={lastCheck&&!lastCheck.error&&<span style={{fontSize:11,color:T.muted}}>{lastCheck.time}</span>}>分析結果</SectionHead>
      {isUpdating ? (
        <Card pad={18}><div style={{display:"flex",alignItems:"center",gap:12}}><div className="cc-spin" style={{width:22,height:22,borderRadius:"50%",border:`2.5px solid ${T.hair}`,borderTopColor:T.primary,flexShrink:0}}/><div><div style={{fontSize:13.5,fontWeight:600,color:T.ink}}>正在抓取官網並進行 AI 分析…</div><div style={{fontSize:12,color:T.muted,marginTop:2}}>比對議程、講者與行前提醒</div></div></div></Card>
      ) : lastCheck?.error ? (
        <Card pad={14} style={{background:"#FFF1F1",borderColor:"#FECACA"}}><div style={{fontSize:13,color:"#991B1B",lineHeight:1.6}}>⚠️ 上次更新遇到錯誤（{lastCheck.time}）。請稍後重試。</div></Card>
      ) : latestResult ? (
        <Card pad={0}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 15px",borderBottom:`1px solid ${T.hair2}`}}>
            <Icon name="spark" size={15} color={T.primary}/>
            <span style={{fontSize:12,fontWeight:700,color:T.ink2}}>{updates[latestResult.key].label}・{updates[latestResult.key].time}</span>
            <button onClick={runUpdate} style={{marginLeft:"auto",border:"none",background:T.primaryTint,color:T.primary,cursor:"pointer",borderRadius:8,padding:"5px 11px",fontSize:11.5,fontWeight:600,fontFamily:FONT_SANS}}>重新整理</button>
          </div>
          <div style={{padding:"13px 15px",fontSize:13,color:T.ink2,lineHeight:1.8,whiteSpace:"pre-line"}}>
            {(updates[latestResult.key].result||"").split(/(【[^】]+】)/g).map((pt,i)=>pt.startsWith("【")?<b key={i} style={{color:T.primary,fontWeight:700}}>{pt}</b>:<React.Fragment key={i}>{pt}</React.Fragment>)}
          </div>
        </Card>
      ) : (
        <Card pad={20} style={{textAlign:"center"}}><div style={{display:"inline-flex",marginBottom:10}}><Icon name="refresh" size={28} color={T.faint}/></div><div style={{fontSize:13,color:T.muted,lineHeight:1.6}}>尚未執行更新。<br/>到期會自動觸發，或立即手動執行。</div></Card>
      )}
      <button onClick={runUpdate} disabled={isUpdating} style={{width:"100%",marginTop:14,border:"none",cursor:isUpdating?"default":"pointer",borderRadius:13,padding:"14px 0",fontSize:14,fontWeight:700,fontFamily:FONT_SANS,background:isUpdating?T.surfaceAlt:T.primary,color:isUpdating?T.faint:T.onPrimary,boxShadow:isUpdating?"none":"0 10px 24px -14px "+T.primary,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {!isUpdating&&<Icon name="refresh" size={17} color={T.onPrimary}/>}
        {isUpdating?"分析中…":latestResult?"立即重新檢查":"立即執行更新"}
      </button>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// APP (主元件)
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  // ── 會議載入狀態 ────────────────────────────────────────────────────────────
  const [appLoading, setAppLoading]     = useState(true);
  const [allConfigs, setAllConfigs]     = useState({});
  const [activeKey, setActiveKey]       = useState(null);
  const [showSwitcher, setShowSwitcher] = useState(false);

  // ── 一般 UI 狀態 ─────────────────────────────────────────────────────────────
  const [tab, setTab]               = useState("home");
  const [curDay, setCurDay]         = useState(null);
  const [notes, setNotes]           = useState({});
  const [media, setMedia]           = useState({});
  const [updates, setUpdates]       = useState({});
  const [reminders, setRem]         = useState({});
  const [expanded, setExpanded]     = useState({});
  const [filter, setFilter]         = useState("all");
  const [isUpdating, setIsUpdating] = useState(false);
  const [hasDot, setHasDot]         = useState(false);
  const [toast, setToast]           = useState(null);
  const [uploading, setUploading]   = useState({});
  const [exportingDoc, setExportingDoc] = useState(false);

  // ── Google Auth ───────────────────────────────────────────────────────────
  const [accessToken, setAccessToken] = useState(null);
  const [userEmail, setUserEmail]     = useState(null);
  const [tokenClient, setTokenClient] = useState(null);
  const [syncStatus, setSyncStatus]   = useState("idle");
  const accessTokenRef = useRef(null);
  const driveRootIdRef = useRef(null);
  const driveFileIdRef = useRef(null);

  const scrollRef     = useRef(null);
  const pendingScroll = useRef(null);

  // ── 初始化：載入所有會議 ─────────────────────────────────────────────────────
  useEffect(() => {
    loadAllConferences().then(configs => {
      const best = autoSelectConference(configs);
      activateConference(configs[best]);
      setAllConfigs(configs);
      setActiveKey(best);
      setCurDay(Object.keys(configs[best].sessions||{})[0]);
      // 載入該會議的 localStorage
      setNotes(loadLS(getNK()));
      setMedia(loadLS(getMK()));
      setUpdates(loadLS(getUK()));
      setRem(()=>{ try{return JSON.parse(localStorage.getItem("ccx_rem_"+best)||"{}");}catch{return {};} });
      setAppLoading(false);
    });
  }, []);

  // ── 切換會議 ──────────────────────────────────────────────────────────────
  const switchConference = useCallback((key) => {
    if (key === activeKey) { setShowSwitcher(false); return; }
    activateConference(allConfigs[key]);
    setActiveKey(key);
    setShowSwitcher(false);
    setCurDay(Object.keys(allConfigs[key].sessions||{})[0]);
    // 重新載入該會議的資料
    setNotes(loadLS(getNK()));
    setMedia(loadLS(getMK()));
    setUpdates(loadLS(getUK()));
    setRem(()=>{ try{return JSON.parse(localStorage.getItem("ccx_rem_"+key)||"{}");}catch{return {};} });
    // 重設 UI 狀態
    setExpanded({}); setFilter("all"); setTab("home"); setHasDot(false);
    // 重設 Drive（不同會議、不同資料夾）
    setAccessToken(null); setUserEmail(null); setSyncStatus("idle");
    accessTokenRef.current=null; driveRootIdRef.current=null; driveFileIdRef.current=null;
    showToast(`已切換至 ${allConfigs[key].name}`);
  }, [activeKey, allConfigs]);

  // ── Scroll reset ─────────────────────────────────────────────────────────
  useEffect(() => {
    if (pendingScroll.current) {
      const id=pendingScroll.current; pendingScroll.current=null;
      requestAnimationFrame(()=>{ const el=document.getElementById("sess-"+id); if(el&&scrollRef.current) scrollRef.current.scrollTop=Math.max(0,el.offsetTop-76); });
    } else if (scrollRef.current) { scrollRef.current.scrollTop=0; }
  }, [tab]);

  // ── Persist reminders ─────────────────────────────────────────────────────
  useEffect(() => { if(activeKey) localStorage.setItem("ccx_rem_"+activeKey,JSON.stringify(reminders)); }, [reminders, activeKey]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2200); };

  const daysLeft = appLoading ? 0 : Math.max(0, Math.ceil((new Date(_C_CFG?.startDate) - new Date()) / 86400000));

  // ── Google Identity Services ──────────────────────────────────────────────
  useEffect(() => {
    if (appLoading) return;
    const init = () => {
      if (!window.google?.accounts?.oauth2) return;
      const tc = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID, scope: DRIVE_SCOPE,
        callback: async (resp) => {
          if (resp.error) { console.error("OAuth:",resp.error); return; }
          accessTokenRef.current=resp.access_token; setAccessToken(resp.access_token);
          try { const r=await fetch("https://www.googleapis.com/oauth2/v1/userinfo",{headers:{Authorization:`Bearer ${resp.access_token}`}}); const u=await r.json(); setUserEmail(u.email); } catch {}
          await loadNotesFromDrive(resp.access_token);
        }
      });
      setTokenClient(tc);
    };
    if (window.google?.accounts?.oauth2) init();
    else { const t=setInterval(()=>{ if(window.google?.accounts?.oauth2){init();clearInterval(t);} },300); return ()=>clearInterval(t); }
  }, [appLoading, activeKey]);

  // ── Drive: load ───────────────────────────────────────────────────────────
  const loadNotesFromDrive = async (token) => {
    const cfg=getCFG(); setSyncStatus("syncing");
    try {
      const rootFolder=await getOrCreateFolder(token,cfg.driveFolderName,null);
      driveRootIdRef.current=rootFolder.id;
      const file=await findFile(token,cfg.notesFileName,rootFolder.id);
      if (file) {
        driveFileIdRef.current=file.id;
        const data=await readJsonFile(token,file.id);
        if(data?.notes){saveLS(getNK(),data.notes);setNotes(data.notes);}
        if(data?.media){saveLS(getMK(),data.media);setMedia(data.media);}
      }
      setSyncStatus("done");
    } catch(e){console.error("Drive load:",e);setSyncStatus("error");}
  };

  // ── Drive: save ───────────────────────────────────────────────────────────
  const saveToDrive = useCallback(async (newNotes, newMedia) => {
    if (!accessTokenRef.current||!driveRootIdRef.current) return;
    const cfg=getCFG(); setSyncStatus("syncing");
    try {
      const data={notes:newNotes,media:newMedia,conference:cfg.name,savedAt:new Date().toISOString()};
      const result=await writeJsonFile(accessTokenRef.current,cfg.notesFileName,data,driveRootIdRef.current,driveFileIdRef.current);
      if(!driveFileIdRef.current&&result?.id) driveFileIdRef.current=result.id;
      setSyncStatus("done");
    } catch(e){console.error("Drive save:",e);setSyncStatus("error");}
  }, []);

  // ── Notes / media ops ─────────────────────────────────────────────────────
  const saveNote = useCallback((id,txt) => {
    const n={...loadLS(getNK())}; if(txt.trim())n[id]=txt; else delete n[id];
    saveLS(getNK(),n); setNotes(n); saveToDrive(n,loadLS(getMK()));
  }, [saveToDrive]);

  const addMediaLink = useCallback((id,type,link) => {
    const m={...loadLS(getMK())}; const cur=m[id]||{driveLinks:[],videoLinks:[]};
    if(type==="drive")cur.driveLinks=[...(cur.driveLinks||[]),link]; else cur.videoLinks=[...(cur.videoLinks||[]),link];
    m[id]=cur; saveLS(getMK(),m); setMedia(m); saveToDrive(loadLS(getNK()),m);
  }, [saveToDrive]);

  const removeMediaLink = useCallback((id,type,idx) => {
    const m={...loadLS(getMK())}; const cur=m[id]||{driveLinks:[],videoLinks:[]};
    if(type==="drive")cur.driveLinks=(cur.driveLinks||[]).filter((_,i)=>i!==idx);
    else cur.videoLinks=(cur.videoLinks||[]).filter((_,i)=>i!==idx);
    const has=(cur.driveLinks?.length||0)+(cur.videoLinks?.length||0)>0;
    if(has)m[id]=cur; else delete m[id];
    saveLS(getMK(),m); setMedia(m); saveToDrive(loadLS(getNK()),m);
  }, [saveToDrive]);

  const handleCapture = useCallback(async (id,sessionTitle,fileInput) => {
    if (!accessTokenRef.current){showToast("請先登入 Google 帳號");return;}
    const files=Array.from(fileInput.files||[]); if(!files.length)return;
    setUploading(p=>({...p,[id]:true}));
    try {
      for(const file of files){
        const isVideo=file.type.startsWith("video/");
        const result=await uploadMediaFile(accessTokenRef.current,file,sessionTitle);
        const timeStr=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});
        addMediaLink(id,isVideo?"video":"drive",{url:result.webViewLink,label:`${sessionTitle.substring(0,15)} ${isVideo?"錄影":"照片"} ${timeStr}`});
      }
      showToast("已上傳至 Drive");
    } catch(e){showToast("上傳失敗："+e.message);}
    setUploading(p=>{const n={...p};delete n[id];return n;});
  }, [addMediaLink]);

  // ── AI Update ─────────────────────────────────────────────────────────────
  const fetchAndAnalyze = useCallback(async (label) => {
    if (isUpdating) return;
    const cfg=getCFG(); const conf=getCONF();
    setIsUpdating(true); setTab("updates");
    let fetched="";
    for(const url of cfg.updateUrls||[]){
      try{ const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`); if(r.ok){const d=await r.json();const tmp=document.createElement("div");tmp.innerHTML=d.contents||"";fetched+=`\n=== ${url} ===\n`+(tmp.innerText||"").replace(/\s+/g," ").substring(0,2500);} }
      catch{ fetched+=`\n=== ${url} ===\n[無法抓取]`; }
    }
    try {
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`你是${cfg.specialistProfile}的大會助理。以下是${cfg.name}官網最新內容（${label}）：\n${fetched}\n\n請用繁體中文：\n【1.議程異動】比對重點場次（${cfg.keySessionsDesc}）是否有異動。若無說「目前無重大議程異動」。\n【2.新增講者】若無說「無新增講者」。\n【3.每日建議】針對${cfg.specialistProfile}，給每天最重要1–2個場次。\n【4.行前提示】一句話30字以內總結。\n請直接回答，不加前言。`}]})});
      const data=await resp.json();
      const result=data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"無法取得分析結果";
      const now=new Date().toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
      const cpKey=daysLeft<=1?"d1":daysLeft<=3?"d3":daysLeft<=7?"w1":"manual";
      const upd={...loadLS(getUK()),[cpKey]:{time:now,label,result},lastCheck:{time:now,label}};
      saveLS(getUK(),upd); setUpdates(upd); showToast("更新完成");
    } catch {
      const now=new Date().toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
      const upd={...loadLS(getUK()),lastCheck:{time:now,label,error:true}};
      saveLS(getUK(),upd); setUpdates(upd); showToast("更新失敗，請稍後重試");
    }
    setIsUpdating(false);
  }, [isUpdating, daysLeft]);

  useEffect(() => {
    if (appLoading) return;
    const conf=getCONF();
    for(const cp of conf.checkpoints){
      if(daysLeft<=cp.days&&daysLeft>0&&!loadLS(getUK())[cp.key]){
        setHasDot(true);
        const t=setTimeout(()=>fetchAndAnalyze(cp.label),3000);
        return ()=>clearTimeout(t);
      }
    }
  }, [appLoading]);

  // ── Exports ───────────────────────────────────────────────────────────────
  const doExportHTML = () => {
    const html=generateExportHTML(loadLS(getNK()),loadLS(getMK()));
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([html],{type:"text/html;charset=utf-8"}));
    a.download=`${getCFG()?.driveFolderName}_筆記_${new Date().toLocaleDateString("zh-TW").replace(/\//g,"-")}.html`;
    a.click(); showToast("HTML 筆記已下載");
  };
  const doExportGoogleDoc = async () => {
    if (!accessTokenRef.current){showToast("請先登入 Google 帳號");return;}
    setExportingDoc(true);
    try{ const url=await exportToGoogleDoc(accessTokenRef.current,loadLS(getNK()),loadLS(getMK())); window.open(url,"_blank"); showToast("Google Doc 已建立"); }
    catch(e){ showToast("建立 Google Doc 失敗："+e.message); }
    setExportingDoc(false);
  };

  // ── Loading 畫面 ──────────────────────────────────────────────────────────
  if (appLoading) return <LoadingScreen/>;

  const conf = getCONF();
  const multiConf = Object.keys(allConfigs).length > 1;
  const notesBadge = Object.keys(notes).length + Object.values(media).reduce((a,m)=>a+(m.driveLinks?.length||0)+(m.videoLinks?.length||0),0);

  const S = {
    daysLeft, tab, notes, media, reminders, updates, isUpdating, uploading, filter, expanded, curDay, syncStatus, accessToken, userEmail, tokenClient, exportingDoc,
    setFilter, setCurDay,
    saveNote, addMediaLink, removeMediaLink, handleCapture,
    toggleReminder: i=>setRem(p=>({...p,[i]:!p[i]})),
    toggleExpand:   id=>setExpanded(p=>({...p,[id]:!p[id]})),
    goTo:       t=>setTab(t),
    goSession:  id=>{ pendingScroll.current=id; setExpanded(p=>({...p,[id]:true})); setTab("sched"); },
    runUpdate:  ()=>fetchAndAnalyze("手動更新"),
    doExportHTML, doExportGoogleDoc,
    toast:      showToast,
    // 切換會議
    onSwitchConference: ()=>setShowSwitcher(true),
    multiConf,
  };

  const titles = { home:"會議助理", sched:"議程", notes:"我的筆記", updates:"行前更新" };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.paper,fontFamily:FONT_SANS,color:T.ink,position:"relative",overflow:"hidden"}}>

      {/* header */}
      <div style={{paddingTop:"max(16px, env(safe-area-inset-top, 44px))",paddingBottom:10,paddingLeft:16,paddingRight:16,background:T.paper,display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexShrink:0,position:"relative",zIndex:6}}>
        <div style={{fontFamily:FONT_SERIF,fontSize:21,fontWeight:700,color:T.ink,letterSpacing:".3px"}}>{titles[tab]}</div>
        <button onClick={()=>{setTab("updates");setHasDot(false);}} style={{display:"inline-flex",alignItems:"center",gap:5,border:"none",cursor:"pointer",background:T.primaryTint,color:T.primary,borderRadius:999,padding:"5px 11px",fontSize:12,fontWeight:700,fontFamily:FONT_SANS,whiteSpace:"nowrap",flexShrink:0,position:"relative"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:T.primary}}/>
          開課倒數 {daysLeft} 天
          {hasDot && <span style={{position:"absolute",top:-2,right:-2,width:8,height:8,borderRadius:"50%",background:"#EF4444",border:"1.5px solid "+T.paper}}/>}
        </button>
      </div>

      {/* scroll area */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch"}}>
        <div style={{paddingBottom:8}}>
          {tab==="home"    && <HomeScreen S={S}/>}
          {tab==="sched"   && <ScheduleScreen S={S}/>}
          {tab==="notes"   && <NotesScreen S={S}/>}
          {tab==="updates" && <UpdatesScreen S={S}/>}
        </div>
      </div>

      {/* bottom nav */}
      <div style={{flexShrink:0,display:"flex",paddingTop:8,paddingBottom:"max(20px, env(safe-area-inset-bottom, 0px))",background:"rgba(255,255,255,.92)",backdropFilter:"blur(16px) saturate(180%)",WebkitBackdropFilter:"blur(16px) saturate(180%)",borderTop:`1px solid ${T.hair}`,position:"relative",zIndex:6}}>
        {[["home","home","首頁"],["sched","calendar","議程"],["notes","note","筆記"],["updates","refresh","更新"]].map(([k,icon,label])=>{
          const on=tab===k;
          const badge=k==="notes"?notesBadge:(k==="updates"&&hasDot)?1:0;
          return (
            <button key={k} onClick={()=>{setTab(k);if(k==="updates")setHasDot(false);}} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"2px 0",fontFamily:FONT_SANS,position:"relative"}}>
              <div style={{position:"relative"}}>
                <Icon name={icon} size={23} color={on?T.primary:T.faint} stroke={on?2:1.7}/>
                {badge>0 && <span style={{position:"absolute",top:-3,right:-8,minWidth:15,height:15,borderRadius:999,background:k==="updates"?"#EF4444":T.gold,color:"#fff",fontSize:9.5,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{k==="updates"?"!":badge}</span>}
              </div>
              <span style={{fontSize:10.5,fontWeight:on?700:500,color:on?T.primary:T.muted}}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* toast */}
      {toast && (
        <div style={{position:"absolute",left:0,right:0,bottom:96,display:"flex",justifyContent:"center",zIndex:40,pointerEvents:"none"}}>
          <div style={{background:T.ink,color:T.paper,fontSize:12.5,fontWeight:600,padding:"10px 16px",borderRadius:999,boxShadow:"0 12px 30px -10px rgba(0,0,0,.4)",display:"inline-flex",alignItems:"center",gap:7}}>
            <Icon name="check" size={14} color={T.paper} stroke={2.4}/>{toast}
          </div>
        </div>
      )}

      {/* 會議切換 sheet */}
      {showSwitcher && (
        <ConferenceSwitcher
          allConfigs={allConfigs}
          activeKey={activeKey}
          onSelect={switchConference}
          onClose={()=>setShowSwitcher(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
