function buildIdx() {
  const idx = {};
  for (const [day, blocks] of Object.entries(SESSIONS))
    for (const bl of blocks)
      if (bl.items) for (const it of bl.items)
        idx[it.id] = { title: it.title, day: DAYS[day], time: bl.time };
  return idx;
}

// ─── DRIVE API ─────────────────────────────────────────────────────────────────
async function driveGet(token, path, params = "") {
  const r = await fetch(`https://www.googleapis.com/drive/v3/${path}${params}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!r.ok) throw new Error(`Drive ${path} ${r.status}`);
  return r.json();
}

async function findFile(token, name, parentId) {
  const safe = name.replace(/'/g, "\\'");
  let q = `name='${safe}' and trashed=false`;
  if (parentId) q += ` and '${parentId}' in parents`;
  const d = await driveGet(token, "files", `?q=${encodeURIComponent(q)}&fields=files(id,name,webViewLink)`);
  return d.files?.[0] || null;
}

async function createFolder(token, name, parentId) {
  const meta = { name, mimeType: "application/vnd.google-apps.folder" };
  if (parentId) meta.parents = [parentId];
  const r = await fetch("https://www.googleapis.com/drive/v3/files", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(meta)
  });
  if (!r.ok) throw new Error("createFolder failed");
  return r.json();
}

async function getOrCreateFolder(token, name, parentId) {
  return (await findFile(token, name, parentId)) || (await createFolder(token, name, parentId));
}

async function readJsonFile(token, fileId) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!r.ok) return null;
  return r.json();
}

async function writeJsonFile(token, name, data, parentId, existingId) {
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  const metaObj = { name, mimeType: "application/json" };
  if (parentId && !existingId) metaObj.parents = [parentId];
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metaObj)], { type: "application/json" }));
  form.append("file", blob);
  const url = existingId
    ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`
    : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
  const r = await fetch(url, {
    method: existingId ? "PATCH" : "POST",
    headers: { Authorization: `Bearer ${token}` },
    body: form
  });
  if (!r.ok) throw new Error("writeJsonFile failed");
  return r.json();
}

async function uploadMediaFile(token, file, sessionTitle) {
  // 每個大會一個獨立頂層資料夾（e.g. ESHG2026）
  const rootFolder = await getOrCreateFolder(token, C_CFG.driveFolderName, null);
  const folderName = sessionTitle.replace(/[★\*\/\\:]/g, "").trim().substring(0, 40);
  const sessionFolder = await getOrCreateFolder(token, folderName, rootFolder.id);
  const ts = new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" }).replace(":", "");
  const meta = JSON.stringify({ name: `${ts}_${file.name}`, parents: [sessionFolder.id] });
  const form = new FormData();
  form.append("metadata", new Blob([meta], { type: "application/json" }));
  form.append("file", file);
  const r = await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,name",
    { method: "POST", headers: { Authorization: `Bearer ${token}` }, body: form }
  );
  if (!r.ok) throw new Error("Upload failed");
  const d = await r.json();
  await fetch(`https://www.googleapis.com/drive/v3/files/${d.id}/permissions`, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ role: "reader", type: "anyone" })
  });
  return d;
}

// ─── GOOGLE DOCS EXPORT ────────────────────────────────────────────────────────
async function exportToGoogleDoc(token, notes, media) {
  const docTitle = `${C_CFG.name} 會議筆記・${C_CFG.location.split("，")[0]}`;
  const r = await fetch("https://docs.googleapis.com/v1/documents", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ title: docTitle })
  });
  if (!r.ok) throw new Error("無法建立 Google Doc");
  const doc = await r.json();
  const docId = doc.documentId;

  const lines = [];
  lines.push(`${C_CFG.name} 會議筆記`);
  lines.push(C_CFG.subtitle);
  lines.push(`匯出日期：${new Date().toLocaleDateString("zh-TW", { year: "numeric", month: "long", day: "numeric" })}`);
  lines.push("");

  for (const [day, blocks] of Object.entries(SESSIONS)) {
    let dayHasContent = false;
    for (const bl of blocks) {
      if (!bl.items) continue;
      for (const it of bl.items) {
        if (notes[it.id] || media[it.id]) { dayHasContent = true; break; }
      }
      if (dayHasContent) break;
    }
    if (!dayHasContent) continue;

    lines.push("═══════════════════════════════════");
    lines.push(DAYS[day]);
    lines.push("═══════════════════════════════════");
    lines.push("");

    for (const bl of blocks) {
      if (!bl.items) continue;
      for (const it of bl.items) {
        const note = notes[it.id];
        const med  = media[it.id];
        if (!note && !med) continue;
        lines.push(`▌ ${bl.time}  ${it.title}`);
        if (it.speakers?.length) lines.push(`   講者：${it.speakers.join(" / ")}`);
        if (note) { lines.push(""); lines.push("📝 筆記："); lines.push(note); }
        if (med?.driveLinks?.length) {
          lines.push(""); lines.push("📷 照片 / 資料：");
          for (const lk of med.driveLinks) lines.push(`   ${lk.label}：${lk.url}`);
        }
        if (med?.videoLinks?.length) {
          lines.push(""); lines.push("🎥 影片：");
          for (const vl of med.videoLinks) lines.push(`   ${vl.label}：${vl.url}`);
        }
        lines.push("");
      }
    }
  }

  const text = lines.join("\n");
  await fetch(`https://docs.googleapis.com/v1/documents/${docId}:batchUpdate`, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ requests: [{ insertText: { location: { index: 1 }, text } }] })
  });

  return `https://docs.google.com/document/d/${docId}/edit`;
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const dayKeys = Object.keys(SESSIONS);
  const [curDay, setCurDay]         = useState(dayKeys[0]);
  const [curFilter, setFilter]      = useState("all");
  const [curView, setView]          = useState("schedule");
  const [notes, setNotes]           = useState(load(NK));
  const [media, setMedia]           = useState(load(MK));
  const [updates, setUpdates]       = useState(load(UK));
  const [openCards, setOpenCards]   = useState({});
  const [draftNotes, setDraftNotes] = useState({});
  const [draftMedia, setDraftMedia] = useState({});
  const [isUpdating, setIsUpdating] = useState(false);
  const [hasDot, setHasDot]         = useState(false);
  const [exportDone, setExportDone] = useState(false);
  const [exportingDoc, setExportingDoc] = useState(false);
  const [uploading, setUploading]   = useState({});

  // Google auth
  const [accessToken, setAccessToken] = useState(null);
  const [userEmail, setUserEmail]     = useState(null);
  const [tokenClient, setTokenClient] = useState(null);
  const [syncStatus, setSyncStatus]   = useState("idle");

  // Stable refs for Drive IDs (avoids stale closures)
  const driveRootIdRef = useRef(null);
  const driveFileIdRef = useRef(null);
  const accessTokenRef = useRef(null);

  const startDate = new Date(C_CFG.startDate);
  const daysLeft  = Math.ceil((startDate - new Date()) / 86400000);

  const CC = {
    acc: "#4338CA", accL: "#EEF0FD", teal: "#065F46", tealL: "#ECFDF5",
    blue: "#1E40AF", blueL: "#EFF6FF", amb: "#92400E", ambL: "#FFFBEB",
    grn: "#14532D", grnL: "#F0FDF4", red: "#7F1D1D", redL: "#FEF2F2",
    border: "1px solid #E7E5E4", muted: "#78716C",
  };

  // ── Google Identity Services ───────────────────────────────────────────────
  useEffect(() => {
    const init = () => {
      if (!window.google?.accounts?.oauth2) return;
      const tc = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: async (resp) => {
          if (resp.error) { console.error("OAuth:", resp.error); return; }
          accessTokenRef.current = resp.access_token;
          setAccessToken(resp.access_token);
          try {
            const r = await fetch("https://www.googleapis.com/oauth2/v1/userinfo", {
              headers: { Authorization: `Bearer ${resp.access_token}` }
            });
            const u = await r.json();
            setUserEmail(u.email);
          } catch {}
          await loadNotesFromDrive(resp.access_token);
        }
      });
      setTokenClient(tc);
    };
    if (window.google?.accounts?.oauth2) init();
    else {
      const t = setInterval(() => { if (window.google?.accounts?.oauth2) { init(); clearInterval(t); } }, 300);
      return () => clearInterval(t);
    }
  }, []);

  // ── Drive: load notes ──────────────────────────────────────────────────────
  const loadNotesFromDrive = async (token) => {
    setSyncStatus("syncing");
    try {
      const rootFolder = await getOrCreateFolder(token, C_CFG.driveFolderName, null);
      driveRootIdRef.current = rootFolder.id;
      const file = await findFile(token, C_CFG.notesFileName, rootFolder.id);
      if (file) {
        driveFileIdRef.current = file.id;
        const data = await readJsonFile(token, file.id);
        if (data?.notes) { persist(NK, data.notes); setNotes(data.notes); }
        if (data?.media) { persist(MK, data.media); setMedia(data.media); }
      }
      setSyncStatus("done");
    } catch (e) { console.error("Drive load:", e); setSyncStatus("error"); }
  };

  // ── Drive: save notes ──────────────────────────────────────────────────────
  const saveToDrive = useCallback(async (newNotes, newMedia) => {
    if (!accessTokenRef.current || !driveRootIdRef.current) return;
    setSyncStatus("syncing");
    try {
      const data = { notes: newNotes, media: newMedia, conference: C_CFG.name, savedAt: new Date().toISOString() };
      const result = await writeJsonFile(
        accessTokenRef.current, C_CFG.notesFileName, data,
        driveRootIdRef.current, driveFileIdRef.current
      );
      if (!driveFileIdRef.current && result?.id) driveFileIdRef.current = result.id;
      setSyncStatus("done");
    } catch (e) { console.error("Drive save:", e); setSyncStatus("error"); }
  }, []);

  // ── Note & media save ──────────────────────────────────────────────────────
  const saveNoteF = (id, txt) => {
    const n = { ...load(NK) };
    if (txt.trim()) n[id] = txt; else delete n[id];
    persist(NK, n); setNotes(n);
    saveToDrive(n, load(MK));
  };

  const saveMediaF = (id, data) => {
    const m = { ...load(MK) };
    const hasContent = (data.driveLinks?.length || 0) + (data.videoLinks?.length || 0) > 0;
    if (hasContent) m[id] = data; else delete m[id];
    persist(MK, m); setMedia(m);
    saveToDrive(load(NK), m);
  };

  // ── Camera / upload ────────────────────────────────────────────────────────
  const handleFileCapture = async (id, sessionTitle, fileInput) => {
    if (!accessTokenRef.current) { alert("請先登入 Google，才能直接上傳到 Drive"); return; }
    const files = Array.from(fileInput.files || []);
    if (!files.length) return;
    setUploading(p => ({ ...p, [id]: true }));
    try {
      const med = media[id] || { driveLinks: [], videoLinks: [] };
      const newDriveLinks = [...(med.driveLinks || [])];
      const newVideoLinks = [...(med.videoLinks || [])];
      for (const file of files) {
        const isVideo = file.type.startsWith("video/");
        const result  = await uploadMediaFile(accessTokenRef.current, file, sessionTitle);
        const timeStr = new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });
        const label   = `${sessionTitle.substring(0, 15)} ${isVideo ? "錄影" : "照片"} ${timeStr}`;
        if (isVideo) newVideoLinks.push({ url: result.webViewLink, label });
        else         newDriveLinks.push({ url: result.webViewLink, label });
      }
      saveMediaF(id, { driveLinks: newDriveLinks, videoLinks: newVideoLinks });
      setDraftMedia(p => { const n = { ...p }; delete n[id]; return n; });
    } catch (e) { alert("上傳失敗：" + e.message); console.error(e); }
    setUploading(p => { const n = { ...p }; delete n[id]; return n; });
  };

  // ── Auto-update ────────────────────────────────────────────────────────────
  const fetchAndAnalyze = useCallback(async (label) => {
    if (isUpdating) return;
    setIsUpdating(true); setView("update");
    let fetched = "";
    for (const url of C_CFG.updateUrls) {
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        if (r.ok) {
          const d = await r.json();
          const tmp = document.createElement("div"); tmp.innerHTML = d.contents || "";
          fetched += `\n=== ${url} ===\n` + (tmp.innerText || "").replace(/\s+/g, " ").substring(0, 2500);
        }
      } catch { fetched += `\n=== ${url} ===\n[無法抓取]`; }
    }
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content:
            `你是${C_CFG.specialistProfile}的大會助理。以下是${C_CFG.name}官網最新內容（${label}）：\n${fetched}\n\n請用繁體中文：\n【1.議程異動】比對重點場次（${C_CFG.keySessionsDesc}）是否有異動。若無說「目前無重大議程異動」。\n【2.新增講者】若無說「無新增講者」。\n【3.每日建議】針對${C_CFG.specialistProfile}，給每天最重要1–2個場次。\n【4.行前提示】一句話30字以內總結。\n請直接回答，不加前言。`
          }]
        })
      });
      const data = await resp.json();
      const result = data.content?.filter(b => b.type === "text").map(b => b.text).join("\n") || "無法取得分析結果";
      const now  = new Date().toLocaleString("zh-TW", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      const cpKey = daysLeft <= 1 ? "d1" : daysLeft <= 3 ? "d3" : daysLeft <= 7 ? "w1" : "manual";
      const upd  = { ...load(UK), [cpKey]: { time: now, label, result }, lastCheck: { time: now, label } };
      persist(UK, upd); setUpdates(upd);
    } catch {
      const now = new Date().toLocaleString("zh-TW", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      const upd = { ...load(UK), lastCheck: { time: now, label, error: true } };
      persist(UK, upd); setUpdates(upd);
    }
    setIsUpdating(false);
  }, [isUpdating, daysLeft]);

  useEffect(() => {
    for (const cp of CHECKPOINTS) {
      if (daysLeft <= cp.days && daysLeft > 0 && !load(UK)[cp.key]) {
        setHasDot(true);
        const t = setTimeout(() => fetchAndAnalyze(cp.label), 3000);
        return () => clearTimeout(t);
      }
    }
  }, []);

  // ── Exports ────────────────────────────────────────────────────────────────
  const doExportHTML = () => {
    const html = generateExportHTML(load(NK), load(MK));

    a.download = `${safe}_筆記_${new Date().toLocaleDateString("zh-TW").replace(/\//g, "-")}.html`;
    a.click();
    setExportDone(true); setTimeout(() => setExportDone(false), 3000);
  };

  const doExportGoogleDoc = async () => {
    if (!accessTokenRef.current) { alert("請先登入 Google 帳號"); return; }
    setExportingDoc(true);
    try {
      const url = await exportToGoogleDoc(accessTokenRef.current, load(NK), load(MK));

  // ── Helpers ────────────────────────────────────────────────────────────────
  const filterItems = (items) => {
    if (!items) return [];
    if (curFilter === "all")      return items;
    if (curFilter === "star")     return items.filter(i => i.tags.includes("star"));
    if (curFilter === "prenatal") return items.filter(i => i.tags.includes("prenatal"));
    if (curFilter === "cyto")     return items.filter(i => i.tags.includes("cyto"));
    if (curFilter === "notes")    return items.filter(i => notes[i.id] || media[i.id]);
    return items;

  const Tag = ({ t }) => {

  const SyncBadge = () => {

      {SESSIONS[curDay].map((bl, bi) => {

                            const v = draftNotes[it.id] !== undefined ? draftNotes[it.id] : (notes[it.id] || "");
                            saveNoteF(it.id, v);
                            setDraftNotes(p => { const n = { ...p }; delete n[it.id]; return n; });
                          }} style={{ background: CC.acc, color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>儲存筆記</button>
                        </div>
                      </div>
                      <MediaEditor id={it.id} sessionTitle={it.title} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );

  // ── Update View ────────────────────────────────────────────────────────────
  const UpdateView = () => (
    <div style={{ padding: "8px 10px 16px" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 7, marginBottom: 10 }}>
        {CHECKPOINTS.map(cp => {
          const done   = !!updates[cp.key];
          const active = !done && daysLeft <= cp.days + 1 && daysLeft > 0;
          return (
            <div key={cp.key} style={{ background: done ? CC.grnL : active ? CC.accL : "#F5F5F4", border: `1px solid ${done ? CC.grn : active ? CC.acc : "#E7E5E4"}`, borderRadius: 9, padding: "9px 7px", textAlign: "center" }}>
              <div style={{ fontSize: 18 }}>{cp.icon}</div>
              <div style={{ fontSize: 10, fontWeight: 600, color: done ? CC.grn : active ? CC.acc : "#aaa", marginTop: 3 }}>{cp.label}</div>
              <div style={{ fontSize: 10, color: "#bbb", marginTop: 1 }}>{done ? "✓ 已完成" : daysLeft <= cp.days ? "建議執行" : `還有 ${daysLeft - cp.days} 天`}</div>
            </div>
          );
        })}
      </div>
      {isUpdating && <div style={{ background: CC.blueL, color: CC.blue, borderRadius: 10, padding: "11px 14px", fontSize: 13, marginBottom: 8 }}>⏳ 正在抓取官網並進行 AI 分析中...</div>}
      {!isUpdating && updates.lastCheck?.error && <div style={{ background: CC.redL, color: CC.red, borderRadius: 10, padding: "11px 14px", fontSize: 13, marginBottom: 8 }}>⚠️ 上次更新遇到網路錯誤（{updates.lastCheck.time}）。請稍後重試。</div>}
      {!isUpdating && updates.lastCheck && !updates.lastCheck.error && <div style={{ background: CC.grnL, color: CC.grn, borderRadius: 10, padding: "11px 14px", fontSize: 13, marginBottom: 8 }}>✓ 上次更新：{updates.lastCheck.time}（{updates.lastCheck.label}）</div>}
      {!isUpdating && !updates.lastCheck && <div style={{ background: "#F5F5F4", color: "#aaa", borderRadius: 10, padding: "11px 14px", fontSize: 13, marginBottom: 8 }}>尚未執行任何更新。到期會自動執行，或點下方按鈕手動觸發。</div>}
      {[...CHECKPOINTS].reverse().map(cp => updates[cp.key] && (
        <div key={cp.key} style={{ background: "#fff", border: CC.border, borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#bbb", textTransform: "uppercase", letterSpacing: ".4px" }}>{cp.icon} {cp.label}・{updates[cp.key].time}</div>
            <button onClick={() => fetchAndAnalyze(cp.label + " 重新整理")} disabled={isUpdating} style={{ background: CC.acc, color: "#fff", border: "none", borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 500, cursor: "pointer", opacity: isUpdating ? .5 : 1 }}>重新整理</button>
          </div>
          <div style={{ fontSize: 13, color: "#333", lineHeight: 1.75, whiteSpace: "pre-wrap" }}>{updates[cp.key].result}</div>
        </div>
      ))}
      {updates.manual && (
        <div style={{ background: "#fff", border: CC.border, borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#bbb", textTransform: "uppercase", letterSpacing: ".4px", marginBottom: 8 }}>🔄 手動更新・{updates.manual.time}</div>
          <div style={{ fontSize: 13, color: "#333", lineHeight: 1.75, whiteSpace: "pre-wrap" }}>{updates.manual.result}</div>
        </div>
      )}
      <button onClick={() => fetchAndAnalyze("手動更新")} disabled={isUpdating} style={{ width: "100%", background: CC.acc, color: "#fff", border: "none", borderRadius: 10, padding: 11, fontSize: 13, fontWeight: 600, cursor: "pointer", opacity: isUpdating ? .6 : 1, marginTop: 4 }}>
        {isUpdating ? "分析中..." : "立即執行更新 →"}
      </button>
    </div>
  );

  // ── Notes View ─────────────────────────────────────────────────────────────
  const NotesView = () => {
    const idx       = buildIdx();
    const noteKeys  = Object.keys(notes);
    const mediaKeys = Object.keys(media);
    const allKeys   = [...new Set([...noteKeys, ...mediaKeys])];
    return (
      <div style={{ padding: "8px 10px 16px" }}>
        <LoginBanner />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
          <div style={{ background: "#fff", border: CC.border, borderRadius: 10, padding: "12px", textAlign: "center" }}>
            <div style={{ fontSize: 26, fontWeight: 600, color: CC.acc }}>{noteKeys.length}</div>
            <div style={{ fontSize: 11, color: CC.muted, marginTop: 1 }}>則文字筆記</div>
          </div>
          <div style={{ background: "#fff", border: CC.border, borderRadius: 10, padding: "12px", textAlign: "center" }}>
            <div style={{ fontSize: 26, fontWeight: 600, color: CC.teal }}>{Object.values(media).reduce((a, m) => a + (m.driveLinks?.length || 0) + (m.videoLinks?.length || 0), 0)}</div>
            <div style={{ fontSize: 11, color: CC.muted, marginTop: 1 }}>個媒體連結</div>
          </div>
        </div>
        {!allKeys.length ? (
          <div style={{ textAlign: "center", padding: "36px 12px", color: "#bbb" }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>📭</div>
            <div style={{ fontSize: 13 }}>還沒有任何筆記或媒體連結</div>
          </div>
        ) : allKeys.map(id => {
          const info = idx[id] || { title: id, day: "", time: "" };
          const med  = media[id] || {};
          return (
            <div key={id} style={{ background: "#fff", border: CC.border, borderLeft: notes[id] ? "3px solid #F59E0B" : `3px solid ${CC.teal}`, borderRadius: "0 10px 10px 0", padding: "10px 12px", marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: "#bbb", marginBottom: 2 }}>{info.day}・{info.time}</div>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: notes[id] ? 6 : 4 }}>{info.title}</div>
              {notes[id] && <div style={{ fontSize: 12, color: "#555", lineHeight: 1.55, whiteSpace: "pre-wrap", marginBottom: (med.driveLinks?.length || med.videoLinks?.length) ? 8 : 0 }}>{notes[id]}</div>}
              {(med.driveLinks || []).map((lk, i) => <a key={i} href={lk.url} target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 5, background: CC.accL, color: CC.acc, borderRadius: 6, padding: "3px 9px", fontSize: 11, fontWeight: 500, textDecoration: "none", margin: "2px" }}>📷 {lk.label}</a>)}
              {(med.videoLinks || []).map((vl, i) => <a key={i} href={vl.url} target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 5, background: CC.tealL, color: CC.teal, borderRadius: 6, padding: "3px 9px", fontSize: 11, fontWeight: 500, textDecoration: "none", margin: "2px" }}>▶ {vl.label}</a>)}
            </div>
          );
        })}
        <div style={{ marginTop: 14, background: "linear-gradient(135deg,#1E1B4B,#4338CA)", borderRadius: 12, padding: "16px 18px" }}>
          <div style={{ color: "#fff", fontSize: 14, fontWeight: 600, marginBottom: 4 }}>📄 匯出會議記錄</div>
          <div style={{ color: "rgba(255,255,255,.65)", fontSize: 12, marginBottom: 12 }}>HTML 可離線儲存列印；Google Doc 可在線編輯與分享</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <button onClick={doExportHTML} style={{ background: "rgba(255,255,255,.2)", color: "#fff", border: "1px solid rgba(255,255,255,.35)", borderRadius: 8, padding: "9px 0", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              {exportDone ? "✓ 下載中..." : "↓ 下載 HTML 版本（可列印）"}
            </button>
            <button onClick={doExportGoogleDoc} disabled={!accessToken || exportingDoc}
              style={{ background: accessToken ? "#fff" : "rgba(255,255,255,.15)", color: accessToken ? CC.acc : "rgba(255,255,255,.4)", border: "none", borderRadius: 8, padding: "9px 0", fontSize: 13, fontWeight: 700, cursor: accessToken ? "pointer" : "not-allowed" }}>
              {exportingDoc ? "⏳ 建立 Google Doc 中..." : accessToken ? "↗ 匯出為 Google Doc（可編輯）" : "請先登入 Google 帳號"}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ── Info View ──────────────────────────────────────────────────────────────
  const InfoView = () => (
    <div style={{ padding: "8px 10px 16px" }}>
      <LoginBanner />
      {[
        {
          title: "📍 地點",
          body: <><div style={{ fontSize: 13, fontWeight: 600 }}>{C_CFG.venue?.split("，")[0]}</div><div style={{ fontSize: 12, color: CC.muted, margin: "2px 0 5px" }}>{C_CFG.venue?.split("，")[1] || ""}</div><a href={C_CFG.mapsUrl} target="_blank" rel="noreferrer" style={{ color: CC.acc, fontSize: 12 }}>Google 地圖 →</a></>
        },
        {
          title: "🕐 報到時間",
          body: <div style={{ fontSize: 12, color: CC.muted, lineHeight: 2.1 }}>{C_CFG.registrationTimes.map((t, i) => <span key={i}>{t}<br/></span>)}</div>
        },
        {
          title: "🔗 重要連結",
          body: <>{C_CFG.links.map(([l, h]) => <a key={l} href={h} target="_blank" rel="noreferrer" style={{ color: CC.acc, fontSize: 13, display: "block", marginBottom: 5 }}>{l} →</a>)}</>
        },
      ].map(({ title, body }) => (
        <div key={title} style={{ background: "#fff", border: CC.border, borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
          <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".5px", color: "#bbb", marginBottom: 7 }}>{title}</div>
          {body}
        </div>
      ))}
      <div style={{ background: CC.ambL, border: "1px solid #FCD34D", borderRadius: 10, padding: "12px 14px" }}>
        <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".5px", color: CC.amb, marginBottom: 7 }}>📌 個人備忘</div>
        {C_CFG.personalReminders.map(s => (
          <div key={s} style={{ fontSize: 12, color: CC.amb, lineHeight: 2, paddingLeft: 13, position: "relative" }}>
            <span style={{ position: "absolute", left: 0 }}>•</span>{s}
          </div>
        ))}
      </div>
    </div>
  );

  // ── Layout ─────────────────────────────────────────────────────────────────
  const dayEntries = Object.entries(DAYS);
  const filters    = [["all","全部"],["star","⭐ 推薦"],["prenatal","🧬 產前"],["cyto","🔬 細胞遺傳"],["notes","📝 有記錄"]];
  const filterColor = { all: CC.acc, star: CC.amb, prenatal: CC.teal, cyto: CC.blue, notes: "#B45309" };
  const navItems   = [["schedule","📅","議程"],["update","🔄","更新"],["notes","📝","筆記"],["info","ℹ️","資訊"]];

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100svh", maxWidth: 700, margin: "0 auto", fontFamily: "-apple-system,'Helvetica Neue',sans-serif", fontSize: 14, color: "#1C1917", background: "#FAFAF8" }}>

      <div style={{ background: "linear-gradient(135deg,#1E1B4B 0%,#4338CA 100%)", color: "#fff", padding: "12px 14px 0", flexShrink: 0, paddingTop: "max(env(safe-area-inset-top,0px), 12px)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: 600, letterSpacing: "-.3px" }}>
              {C_CFG.name}
              {accessToken && <span style={{ fontSize: 10, background: "rgba(255,255,255,.2)", padding: "1px 7px", borderRadius: 10, marginLeft: 7, verticalAlign: "middle" }}>
                {syncStatus === "syncing" ? "⏳" : "☁"} Drive
              </span>}
            </div>
            <div style={{ fontSize: 11, opacity: .6, marginTop: 1 }}>
              {C_CFG.location.split("，")[0]}・{C_CFG.dates}・{daysLeft > 0 ? `距今 ${daysLeft} 天` : "進行中"}
            </div>
          </div>
          <div style={{ display: "flex", gap: 5 }}>
            {!accessToken && <button onClick={() => tokenClient?.requestAccessToken()} disabled={!tokenClient} style={{ background: "rgba(255,255,255,.18)", border: "none", color: "#fff", borderRadius: 20, padding: "5px 11px", fontSize: 11, fontWeight: 500, cursor: tokenClient ? "pointer" : "not-allowed" }}>🔑 登入</button>}
            <button onClick={() => { fetchAndAnalyze("手動更新"); setView("update"); }} style={{ background: "rgba(255,255,255,.18)", border: "none", color: "#fff", borderRadius: 20, padding: "5px 11px", fontSize: 11, fontWeight: 500, cursor: "pointer" }}>↻ 更新</button>
            <button onClick={doExportHTML} style={{ background: "rgba(255,255,255,.18)", border: "none", color: "#fff", borderRadius: 20, padding: "5px 11px", fontSize: 11, fontWeight: 500, cursor: "pointer" }}>{exportDone ? "✓" : "↓ 匯出"}</button>
          </div>
        </div>
        {curView === "schedule" && (
          <div style={{ display: "flex", overflowX: "auto", scrollbarWidth: "none" }}>
            {dayEntries.map(([d, label]) => (
              <button key={d} onClick={() => setCurDay(d)} style={{ flexShrink: 0, padding: "8px 13px", fontSize: 12, fontWeight: 500, color: curDay === d ? "#fff" : "rgba(255,255,255,.45)", cursor: "pointer", borderBottom: curDay === d ? "2.5px solid #fff" : "2.5px solid transparent", borderTop: "none", borderLeft: "none", borderRight: "none", background: "none", whiteSpace: "nowrap" }}>{label}</button>
            ))}
          </div>
        )}
      </div>

      {curView === "schedule" && (
        <div style={{ background: "#fff", borderBottom: CC.border, padding: "7px 12px", display: "flex", gap: 5, overflowX: "auto", scrollbarWidth: "none", flexShrink: 0 }}>
          {filters.map(([f, label]) => {
            const active = curFilter === f;
            const fc     = filterColor[f];
            return <button key={f} onClick={() => setFilter(f)} style={{ flexShrink: 0, padding: "4px 10px", border: active ? `1px solid ${fc}` : CC.border, borderRadius: 20, fontSize: 11, cursor: "pointer", background: active ? fc : "none", color: active ? "#fff" : "#999", fontWeight: 500 }}>{label}</button>;
          })}
        </div>
      )}

      <div style={{ flex: 1, overflowY: "auto", background: "#FAFAF8" }}>
        {curView === "schedule" && <ScheduleView />}
        {curView === "update"   && <UpdateView />}
        {curView === "notes"    && <NotesView />}
        {curView === "info"     && <InfoView />}
      </div>

      <div style={{ background: "#fff", borderTop: CC.border, display: "flex", flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom,0px)" }}>
        {navItems.map(([v, icon, label]) => (
          <button key={v} onClick={() => { setView(v); if (v === "update") setHasDot(false); }} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", padding: "7px 4px 9px", cursor: "pointer", fontSize: 10, fontWeight: 500, color: curView === v ? CC.acc : "#bbb", border: "none", background: "none", gap: 2, position: "relative" }}>
            <span style={{ fontSize: 18 }}>{icon}</span>{label}
            {v === "update" && hasDot && <span style={{ position: "absolute", top: 6, right: "calc(50% - 14px)", width: 7, height: 7, borderRadius: "50%", background: "#EF4444" }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
